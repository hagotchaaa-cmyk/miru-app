workflows:
  ios-workflow:
    name: Miru iOS Build
    max_build_duration: 60
    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miru.dating
      vars:
        BUNDLE_ID: com.miru.dating
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: v18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor
        script: |
          npm install -g @capacitor/cli
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod init && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: YXJF3RGB8H
        issuer_id: 9cf2b90b-d18d-4368-865a-95076b20f179
        submit_to_testflight: false
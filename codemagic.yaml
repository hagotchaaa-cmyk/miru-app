workflows:
  ios-workflow:
    name: Miru iOS Build
    max_build_duration: 60
    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miru.dating
      vars:
        BUNDLE_ID: com.miru.dating
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: v18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor
        script: |
          npm install -g @capacitor/cli
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform and sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install --repo-update
      - name: Set build number
        script: |
          cd ios/App
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0) + 1))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        apple_id: hagotchaaa@gmail.com
        password: $APP_SPECIFIC_PASSWORD
        submit_to_testflight: false

workflows:
  ios-workflow:
    name: Miru iOS Build
    max_build_duration: 60
    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miru.dating
      vars:
        BUNDLE_ID: com.miru.dating
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: v18
      xcode: latest
    scripts:
      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform and sync
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set build number
        script: |
          cd ios/App
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0) + 1))
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>SYTHFLKFXC</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.miru.dating</key>
              <string>MiruDistribution</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        apple_id: hagotchaaa@gmail.com
        password: $APP_SPECIFIC_PASSWORD
        submit_to_testflight: false

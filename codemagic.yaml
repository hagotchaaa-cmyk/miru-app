workflows:
  ios-workflow:
    name: Miru iOS Build
    max_build_duration: 60
    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miru.dating
        provisioning_profile: MiruDistribution
        certificate: MiruCertificate
        team_id: SYTHFLKFXC
      vars:
        BUNDLE_ID: com.miru.dating
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: v18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Capacitor
        script: |
          npm install -g @capacitor/cli
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod init && pod install
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

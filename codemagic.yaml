workflows:
  ios-workflow:
    name: Miru iOS Build
    max_build_duration: 60

    environment:
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.miru.dating
      vars:
        BUNDLE_ID: com.miru.dating
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: v18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Capacitor CLI
        script: |
          npm install -g @capacitor/cli

      - name: Install dependencies
        script: |
          npm install

      - name: Prepare iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: avong9708@gmail.com
        password: $APP_SPECIFIC_PASSWORD
        submit_to_testflight: false
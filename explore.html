<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miru — Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F8F6FF;color:#1A1528;padding-bottom:86px}
    .nav{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #E4DEFF;background:rgba(248,246,255,.95)}
    .logo{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;font-weight:700}
    .feed{padding:16px}
    .card{border-radius:28px;overflow:hidden;background:linear-gradient(145deg,#ede6ff 0%,#d8ccff 50%,#c8b8f8 100%);min-height:75vh;position:relative;box-shadow:0 12px 40px rgba(124,92,191,.12)}
    .bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .fade{position:absolute;left:0;right:0;bottom:0;height:55%;background:linear-gradient(to top,rgba(248,246,255,1),transparent)}
    .prompt{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.9);border:1px solid #E4DEFF;border-radius:999px;padding:6px 12px;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#6B5F8A}
    .score{position:absolute;top:16px;right:16px;background:#7C5CBF;color:#fff;border-radius:999px;padding:6px 12px;font-size:11px;font-weight:700}
    .content{position:absolute;left:0;right:0;bottom:0;padding:24px}
    .name{font-family:'Playfair Display',serif;font-size:34px;font-weight:700}
    .loc{font-size:13px;color:#6B5F8A;margin:6px 0 12px}
    .bio{font-size:14px;color:#6B5F8A;line-height:1.5;margin-bottom:12px}
    .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .tag{padding:5px 10px;border-radius:999px;background:rgba(255,255,255,.9);border:1px solid #E4DEFF;font-size:11px;color:#6B5F8A}
    .actions{display:flex;gap:14px;justify-content:center}
    .btn{width:62px;height:62px;border-radius:50%;border:1px solid #E4DEFF;background:rgba(255,255,255,.95);font-size:22px;cursor:pointer}
    .empty{padding:40px;text-align:center;color:#6B5F8A}
    .tabs{position:fixed;left:0;right:0;bottom:0;height:76px;background:rgba(255,255,255,.96);border-top:1px solid #E4DEFF;display:flex;justify-content:space-around;align-items:center;padding-bottom:10px}
    .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:#A99DC0;text-decoration:none}
    .tab.on{color:#7C5CBF}
    .tab div:last-child{font-size:9px;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="nav">
    <div class="logo">miru.</div>
    <div>Explore</div>
  </div>

  <div class="feed" id="feed"></div>

  <div class="tabs">
    <a class="tab" href="index.html"><div>💜</div><div>Matches</div></a>
    <a class="tab" href="messages.html"><div>💬</div><div>Messages</div></a>
    <a class="tab on" href="explore.html"><div>🔍</div><div>Explore</div></a>
    <a class="tab" href="profile.html"><div>👤</div><div>Profile</div></a>
  </div>

<script>
const sb = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_ANON_KEY || window.SUPABASE_KEY
);

let me = null;
let profiles = [];
let current = 0;

async function init(){
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href = "auth.html";
  me = user;
  await loadProfiles();
}

async function loadProfiles(){
  const { data, error } = await sb
    .from("profiles")
    .select("user_id,name,age,bio,avatar_url,is_premium,boost_until")
    .neq("user_id", me.id)
    .order("boost_until", { ascending:false });

  if (error) {
    document.getElementById("feed").innerHTML = `<div class="empty">${error.message}</div>`;
    return;
  }

  profiles = data || [];
  renderCurrent();
}

function renderCurrent(){
  const feed = document.getElementById("feed");
  const p = profiles[current];

  if (!p) {
    feed.innerHTML = `<div class="empty">No more profiles right now.</div>`;
    return;
  }

  feed.innerHTML = `
    <div class="card">
      ${p.avatar_url ? `<div class="bg" style="background-image:url('${p.avatar_url}')"></div>` : ``}
      <div class="prompt">"Make me laugh..."</div>
      <div class="score">97% match</div>
      <div class="fade"></div>
      <div class="content">
        <div class="name">${p.name || "Match"}${p.age ? `, ${p.age}` : ""}</div>
        <div class="loc">📍 Nearby · ${p.is_premium ? "Premium" : "Miru"}</div>
        <div class="bio">${p.bio || "No bio yet."}</div>
        <div class="tags">
          <div class="tag">real</div>
          <div class="tag">video-first</div>
          ${p.is_premium ? `<div class="tag">premium</div>` : ``}
        </div>
        <div class="actions">
          <button class="btn" onclick="passUser()">✕</button>
          <button class="btn" onclick="superLikeUser()">⚡</button>
          <button class="btn" onclick="likeUser()">❤️</button>
        </div>
      </div>
    </div>
  `;
}

function nextProfile(){
  current += 1;
  renderCurrent();
}

function passUser(){
  nextProfile();
}

async function likeUser(){
  const p = profiles[current];
  if (!p) return;

  const { data: existing } = await sb
    .from("likes")
    .select("id")
    .eq("user_id", me.id)
    .eq("target_user_id", p.user_id)
    .eq("type", "like")
    .maybeSingle();

  if (!existing) {
    await sb.from("likes").insert({
      user_id: me.id,
      target_user_id: p.user_id,
      type: "like"
    });
    await maybeCreateConversation(me.id, p.user_id);
  }

  nextProfile();
}

async function superLikeUser(){
  const p = profiles[current];
  if (!p) return;

  const { data: existing } = await sb
    .from("likes")
    .select("id")
    .eq("user_id", me.id)
    .eq("target_user_id", p.user_id)
    .eq("type", "super")
    .maybeSingle();

  if (!existing) {
    await sb.from("likes").insert({
      user_id: me.id,
      target_user_id: p.user_id,
      type: "super"
    });
    await maybeCreateConversation(me.id, p.user_id);
  }

  nextProfile();
}

async function maybeCreateConversation(myId, targetId){
  const { data: mutual } = await sb
    .from("likes")
    .select("id")
    .eq("user_id", targetId)
    .eq("target_user_id", myId)
    .limit(1);

  if (!mutual || !mutual.length) return;

  const { data: existing } = await sb
    .from("conversations")
    .select("id")
    .or(`and(user_a.eq.${myId},user_b.eq.${targetId}),and(user_a.eq.${targetId},user_b.eq.${myId})`)
    .maybeSingle();

  if (!existing) {
    await sb.from("conversations").insert({
      user_a: myId,
      user_b: targetId,
      last_message: "You matched 💜",
      last_message_at: new Date().toISOString()
    });
    alert("It’s a match 💜");
  }
}

init();
</script>
</body>
</html>

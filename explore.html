<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./notifications.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0714" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <title>Miru — Explore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A0714;
      --surface:  #100D22;
      --s2:       #181430;
      --border:   rgba(180,170,255,0.10);
      --border-hi:rgba(180,170,255,0.20);
      --white:    #FFFFFF;
      --text:     #F0ECFF;
      --soft:     #C4BCEE;
      --muted:    #7A72AA;
      --lilac:    #B8AEFF;
      --gold:     #F5CE7A;
      --pass:     #FF7090;
      --like:     #7DFFC8;
      --super:    #7EB8FF;
      --serif:    'Cormorant Garamond', serif;
      --sans:     'Cabinet Grotesk', sans-serif;
      --shadow:   0 24px 60px rgba(0,0,0,0.50);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── Grain + glow bg ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 50% -5%, rgba(90,70,200,0.30), transparent),
        radial-gradient(ellipse 40% 40% at 85% 55%, rgba(130,100,255,0.10), transparent);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── Layout ── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ── */
    .nav {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px 10px;
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .logo {
      font-family: var(--serif);
      font-size: 26px;
      font-style: italic;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.4px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .deck-pill {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 800;
      color: var(--soft);
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.09); }

    /* ── Filter bar ── */
    .filters {
      flex-shrink: 0;
      padding: 0 18px 10px;
    }

    .filter-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }

    .fchip {
      flex-shrink: 0;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .fchip.on {
      background: var(--white);
      color: #0A0714;
      border-color: var(--white);
      box-shadow: 0 4px 18px rgba(255,255,255,0.14);
    }

    /* ── Card stack area ── */
    .stack-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 0 14px;
    }

    /* Ghost cards behind */
    .ghost {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      border: 1px solid var(--border);
    }

    .ghost-2 {
      background: rgba(255,255,255,0.025);
      transform: scale(0.94) translateY(12px);
      z-index: 1;
    }

    .ghost-1 {
      background: rgba(255,255,255,0.04);
      transform: scale(0.97) translateY(6px);
      z-index: 2;
    }

    /* Main card */
    .card {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      overflow: hidden;
      z-index: 3;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.10);
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
      transition: box-shadow 0.2s;
    }

    .card:active { cursor: grabbing; }

    /* Drag indicator overlays */
    .card-like-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(125,255,200,0.25), transparent 60%);
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 10;
      pointer-events: none;
      border-radius: 28px;
    }

    .card-pass-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(225deg, rgba(255,112,144,0.25), transparent 60%);
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 10;
      pointer-events: none;
      border-radius: 28px;
    }

    .drag-label {
      position: absolute;
      top: 24px;
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 700;
      font-style: italic;
      z-index: 11;
      opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
      letter-spacing: -0.5px;
      padding: 8px 16px;
      border-radius: 14px;
      border: 3px solid;
    }

    .drag-label.like-label {
      left: 20px;
      color: var(--like);
      border-color: var(--like);
      transform: rotate(-12deg);
    }

    .drag-label.pass-label {
      right: 20px;
      color: var(--pass);
      border-color: var(--pass);
      transform: rotate(12deg);
    }

    .drag-label.super-label {
      left: 50%;
      transform: translateX(-50%) rotate(0deg);
      color: var(--super);
      border-color: var(--super);
      top: auto;
      bottom: 120px;
    }

    /* Card background */
    .card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
    }

    .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5,3,15,0.05) 0%,
        rgba(5,3,15,0.15) 40%,
        rgba(5,3,15,0.75) 70%,
        rgba(5,3,15,0.96) 100%
      );
    }

    /* Card top badge row */
    .card-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 5;
    }

    .prompt-badge {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      color: #0A0714;
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      max-width: 200px;
      line-height: 1.3;
    }

    .compat-badge {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(10,7,20,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      backdrop-filter: blur(10px);
    }

    /* Card content */
    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      z-index: 5;
    }

    .card-name-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 6px;
      gap: 10px;
    }

    .card-report-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s, color 0.15s;
      margin-bottom: 4px;
    }
    .card-report-btn:hover { background: rgba(255,112,144,0.15); color: #FF7090; border-color: rgba(255,112,144,0.3); }

    .card-name {
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 700;
      line-height: 0.95;
      color: var(--white);
      letter-spacing: -0.8px;
    }

    .card-loc {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-bio {
      font-size: 14px;
      color: var(--soft);
      line-height: 1.6;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .card-tag {
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--soft);
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Action buttons ── */
    .actions {
      flex-shrink: 0;
     padding: 10px 20px 90px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 18px;
    }

    .act-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--sans);
      transition: transform 0.15s filter 0.15s;
      padding: 0;
    }

    .act-btn:hover  { transform: scale(1.10) translateY(-2px); }
    .act-btn:active { transform: scale(0.90); }

    /* SVG icon wrapper — NO background, NO border-radius box */
    .act-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.40));
      transition: filter 0.15s;
    }

    .act-btn.pass  .act-icon { width: 54px; height: 54px; }
    .act-btn.like  .act-icon { width: 70px; height: 70px; }
    .act-btn.super .act-icon { width: 46px; height: 46px; }
    .act-btn.undo  .act-icon { width: 40px; height: 40px; }

    .act-btn.pass:hover  .act-icon { filter: drop-shadow(0 8px 22px rgba(255,112,144,0.55)); }
    .act-btn.like:hover  .act-icon { filter: drop-shadow(0 10px 28px rgba(125,255,200,0.55)); }
    .act-btn.super:hover .act-icon { filter: drop-shadow(0 8px 22px rgba(126,184,255,0.55)); }
    .act-btn.undo:hover  .act-icon { filter: drop-shadow(0 6px 16px rgba(255,255,255,0.30)); }

    .act-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .act-btn.pass  .act-label { color: var(--pass); }
    .act-btn.super .act-label { color: var(--super); }
    .act-btn.like  .act-label { color: var(--like); }
    .act-btn.undo  .act-label { color: var(--muted); }

    /* ── Bottom tab bar ── */
  .tab-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(430px, 100%);
      padding: 10px 4px calc(12px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(10,7,20,0.94);
      border-top: 1px solid rgba(180,170,255,0.10);
      backdrop-filter: blur(24px);
      z-index: 70;
    }
    .tab-item {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border-radius: 12px;
      color: rgba(180,170,255,0.38);
      transition: color 0.18s;
      position: relative;
      min-width: 52px;
    }
    .tab-item.on { color: #FFFFFF; }
    .tab-item.on::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(90deg, #B8AEFF, #7DFFC8);
    }
    .tab-svg { width: 21px; height: 21px; }
    .tab-item:not(.on) .tab-svg { opacity: 0.45; }
    .tab-label { font-size: 8.5px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; }

    /* ── Empty state ── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      z-index: 3;
    }

    .empty-emoji { font-size: 48px; margin-bottom: 16px; }

    .empty-title {
      font-family: var(--serif);
      font-size: 30px;
      font-style: italic;
      color: var(--white);
      margin-bottom: 10px;
    }

    .empty-body {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── Loading state ── */
    .loading-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--lilac);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Match modal ── */
    .match-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .match-modal.visible {
      opacity: 1;
      pointer-events: all;
    }

    .match-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5,3,15,0.88);
      backdrop-filter: blur(16px);
    }

    .match-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      border: 1px solid var(--border-hi);
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .match-hearts {
      font-size: 44px;
      margin-bottom: 16px;
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    .match-title {
      font-family: var(--serif);
      font-size: 42px;
      font-style: italic;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .match-sub {
      font-size: 14px;
      color: var(--soft);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .match-name {
      color: var(--like);
      font-weight: 800;
    }

    .match-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .match-msg-btn {
      padding: 15px;
      border-radius: 999px;
      background: var(--white);
      color: #0A0714;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,255,255,0.14);
    }

    .match-skip-btn {
      padding: 13px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      cursor: pointer;
    }

    /* ── Swipe animations ── */
    .card.fly-right {
      animation: flyRight 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    .card.fly-left {
      animation: flyLeft 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    .card.fly-up {
      animation: flyUp 0.45s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes flyRight {
      to { transform: translateX(140%) rotate(28deg); opacity: 0; }
    }

    @keyframes flyLeft {
      to { transform: translateX(-140%) rotate(-28deg); opacity: 0; }
    }

    @keyframes flyUp {
      to { transform: translateY(-140%) scale(0.8); opacity: 0; }
    }

    /* Card enter animation */
    .card.enter {
      animation: cardEnter 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
    }

    @keyframes cardEnter {
      from { transform: scale(0.88) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ── AI Matchmaker banner ── */
    .ai-banner {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 8px 16px 0;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(184,174,255,0.07);
      border: 1px solid rgba(184,174,255,0.18);
    }
    .ai-banner.show { display: flex; }
    .ai-banner-icon { font-size: 16px; flex-shrink: 0; }
    .ai-banner-text { flex: 1; font-size: 12px; font-weight: 700; color: var(--lilac); line-height: 1.4; }
    .ai-banner-text span { color: var(--white); }
    .ai-banner-link { font-size: 11px; font-weight: 700; color: var(--muted); text-decoration: none; flex-shrink: 0; }
    .ai-banner-link:hover { color: var(--lilac); }
    .ai-pick-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(184,174,255,0.18);
      border: 1px solid rgba(184,174,255,0.35);
      color: var(--lilac);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.3px;
      backdrop-filter: blur(8px);
      z-index: 3;
    }
  </style>
</head>

<body>
  <div class="shell">

    <!-- Nav -->
    <div class="nav">
      <div class="brand">
        <img class="brand-icon" src="icon.svg" alt="Miru" />
        <div class="logo">miru.</div>
      </div>
      <div class="nav-right">
        <div class="deck-pill" id="swipeBadge">40 swipes left</div>
        <div class="deck-pill" id="deckPill">— nearby</div>
        <button class="icon-btn notif-btn" onclick="miruNotif.toggle()" title="Notifications">🔔<span class="notif-badge"></span></button>
        <button class="icon-btn" onclick="window.location.href='profile.html'" title="Profile">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-scroll">
        <button class="fchip on" data-filter="all">For you</button>
        
        <button class="fchip" data-filter="new">New faces</button>
        <button class="fchip" data-filter="boosted">Boosted</button>
        <button class="fchip" data-filter="nearby">Nearby</button>
      </div>
    </div>

    <!-- AI Matchmaker banner -->
    <div class="ai-banner" id="aiBanner">
      <div class="ai-banner-icon">🤖</div>
      <div class="ai-banner-text">AI Matchmaker — <span id="aiBannerText">curating your picks</span></div>

  <script>
    // ── Supabase ──────────────────────────────────────────────
    const sb = supabase.createClient(
      window.SUPABASE_URL,
      window.SUPABASE_ANON_KEY || window.SUPABASE_KEY
    );

    // ── State ─────────────────────────────────────────────────
    let me = null;
    let myProfile = null;
    let profiles = [];
    let allProfiles = [];
    let current = 0;
    let history = [];
    let isDragging = false;

    // ── Swipe limit ───────────────────────────────────────────
    const FREE_LIMIT = 40;
    const SWIPE_KEY  = 'miru_swipes';

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function loadSwipeCount() {
      try {
        const raw = localStorage.getItem(SWIPE_KEY);
        if (!raw) return 0;
        const obj = JSON.parse(raw);
        return obj.date === todayStr() ? (obj.used || 0) : 0;
      } catch (e) { return 0; }
    }

    function saveSwipeCount(n) {
      try { localStorage.setItem(SWIPE_KEY, JSON.stringify({ date: todayStr(), used: n })); } catch (e) {}
    }

    function swipesRemaining() {
      return Math.max(FREE_LIMIT - loadSwipeCount(), 0);
    }

    function renderSwipeBadge() {
      const badge = document.getElementById('swipeBadge');
      if (!badge) return;
      const left = swipesRemaining();
      badge.textContent = `${left} swipe${left !== 1 ? 's' : ''} left`;
      badge.style.color = left <= 5 ? '#FF7090' : left <= 15 ? '#F5CE7A' : '';
    }

    function useSwipe() {
      const used = loadSwipeCount();
      if (used >= FREE_LIMIT) { showPaywall(); return false; }
      saveSwipeCount(used + 1);
      renderSwipeBadge();
      return true;
    }

    let dragStartX = 0;
    let dragStartY = 0;
    let dragX = 0;
    let dragY = 0;
    let currentCard = null;
    let lastMatchedUser = null;

    const PROMPTS = [
      '"Make me laugh..."',
      '"Something weird about you..."',
      '"Tell me a story..."',
      '"What are you really like?"',
      '"What do you want right now?"',
      '"Change my mind about..."',
      '"My most unpopular opinion..."',
    ];

    const VIBES = ['intentional', 'real talk', 'video-first', 'creative', 'deep diver', 'low-key', 'weekend plans'];

    function esc(v) {
      return String(v ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function gradients(i) {
      const g = [
        'linear-gradient(145deg,#3D3280,#1A1448)',
        'linear-gradient(145deg,#5F3D8A,#221540)',
        'linear-gradient(145deg,#2E4080,#0F1A3A)',
        'linear-gradient(145deg,#6B3D6B,#1E0F2A)',
        'linear-gradient(145deg,#3D5F80,#0F1E2E)',
      ];
      return g[i % g.length];
    }

    function compatibility(i) { return Math.max(80, 97 - i * 3); }
    function getPrompt(i)      { return PROMPTS[i % PROMPTS.length]; }
    function getVibes(p, i)    {
      const base = [];
      base.push(VIBES[i % VIBES.length]);
      base.push(VIBES[(i + 2) % VIBES.length]);
      return base.slice(0, 3);
    }

    // ── Init ──────────────────────────────────────────────────
    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.replace('auth.html'); return; }
      me = user;

      // Load profile to check premium status
      const { data: profile } = await sb
        .from('profiles')
        .select('user_id')
        .eq('user_id', me.id)
        .maybeSingle();
      myProfile = profile || {};

      renderSwipeBadge();
      bindFilters();
      await loadProfiles();
    }

    // ── AI scoring ────────────────────────────────────────────
    const VIBE_KEYWORDS = {
      funny:       ['funny', 'humor', 'humour', 'laugh', 'hilarious', 'jokes', 'witty', 'sarcastic', 'comedian'],
      deep:        ['deep', 'thoughtful', 'meaningful', 'conversations', 'philosophy', 'introspective', 'intellectual', 'mind', 'ideas'],
      chill:       ['chill', 'relaxed', 'easygoing', 'laid back', 'lowkey', 'easy going', 'mellow', 'vibe'],
      ambitious:   ['ambitious', 'driven', 'goals', 'career', 'motivated', 'hustle', 'success', 'grind', 'startup'],
      creative:    ['creative', 'art', 'music', 'design', 'write', 'paint', 'draw', 'create', 'artist', 'musician', 'writer'],
      adventurous: ['adventurous', 'travel', 'explore', 'outdoor', 'hike', 'adventure', 'spontaneous', 'outdoors', 'roadtrip'],
      romantic:    ['romantic', 'romance', 'love', 'sweet', 'thoughtful', 'gestures'],
      homebody:    ['homebody', 'cozy', 'home', 'netflix', 'cooking', 'quiet', 'stay in'],
    };

    const GOAL_KEYWORDS = {
      relationship: ['relationship', 'serious', 'long-term', 'commitment', 'forever', 'partner', 'settle'],
      connection:   ['connection', 'genuine', 'real', 'meaningful', 'authentic', 'connect'],
      casual:       ['casual', 'fun', 'see where', 'no pressure', 'keep it chill'],
      unsure:       [],
    };

    function scoreProfile(p, prefs) {
      let score = 50;
      const bio         = (p.bio   || '').toLowerCase();
      const theirVibes  = Array.isArray(p.vibes) ? p.vibes : [];
      const myVibes     = prefs.vibes || [];
      const theirGoal   = p.goal  || '';
      const myGoal      = prefs.goal || '';

      // Direct vibe-to-vibe overlap (most powerful signal)
      const overlap = myVibes.filter(v => theirVibes.includes(v)).length;
      score += overlap * 15;

      // Goal match
      if (theirGoal && myGoal && theirGoal === myGoal) score += 20;

      // Bio keyword fallback (for users who haven't set vibes yet)
      if (!theirVibes.length) {
        myVibes.forEach(vibe => {
          (VIBE_KEYWORDS[vibe] || []).forEach(kw => {
            if (bio.includes(kw)) score += 5;
          });
        });
      }
      if (!theirGoal) {
        (GOAL_KEYWORDS[myGoal] || []).forEach(kw => {
          if (bio.includes(kw)) score += 3;
        });
      }

      // Boosted profiles rank higher
      if (p.boost_until && new Date(p.boost_until) > new Date()) score += 12;

      return Math.min(score, 99);
    }

    // ── Load profiles from Supabase ───────────────────────────
    async function loadProfiles() {
      showLoading(true);

      // Fetch matchmaker preferences
      const { data: prefs } = await sb
        .from('matchmaker_preferences')
        .select('*')
        .eq('user_id', me.id)
        .maybeSingle();

      const aiEnabled = prefs?.ai_enabled || false;

      // Build base query
      let query = sb
        .from('profiles')
        .select('user_id,name,age,bio,avatar_url,boost_until,status,vibes,goal')
        .neq('user_id', me.id)
        .neq('status', 'paused')
        .order('boost_until', { ascending: false, nullsFirst: false });

      // Age range filter (applied at DB level when AI is on)
      if (aiEnabled && prefs?.age_range) {
        const [minAge, maxAge] = prefs.age_range.split('-').map(Number);
        if (!isNaN(minAge) && !isNaN(maxAge)) {
          query = query.or(`age.gte.${minAge},age.is.null`).lte('age', maxAge);
        }
      }

      const { data, error } = await query;
      showLoading(false);

      if (error) {
        showEmpty('Could not load profiles. Please try again.');
        return;
      }

      // Filter out already-liked profiles
      const { data: myLikes } = await sb
        .from('likes')
        .select('target_user_id')
        .eq('user_id', me.id);

      const likedIds = new Set((myLikes || []).map(l => l.target_user_id));
      let filtered = (data || []).filter(p => !likedIds.has(p.user_id));

      if (aiEnabled && prefs) {
        // Score and sort — no limit, show all matches
        filtered = filtered.map(p => ({ ...p, ai_score: scoreProfile(p, prefs), ai_pick: true }));
        filtered.sort((a, b) => b.ai_score - a.ai_score);

        // Show AI banner
        const banner = document.getElementById('aiBanner');
        banner.classList.add('show');
        document.getElementById('aiBannerText').textContent =
          `AI sorted · ${prefs.goal || 'connection'} focused`;
      } else {
        document.getElementById('aiBanner').classList.remove('show');
      }

      allProfiles = filtered;
      applyFilter('all');
    }

    // ── Filter logic ──────────────────────────────────────────
    function applyFilter(type) {
      switch (type) {

        case 'new':     profiles = [...allProfiles].reverse(); break;
        case 'boosted': profiles = allProfiles.filter(p => p.boost_until && new Date(p.boost_until) > new Date()); break;
        default:        profiles = allProfiles; break;
      }
      current = 0;
      history = [];
      updateDeckPill();
      renderCard();
    }

    function bindFilters() {
      document.querySelectorAll('.fchip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.fchip').forEach(c => c.classList.remove('on'));
          chip.classList.add('on');
          applyFilter(chip.dataset.filter);
        });
      });
    }

    // ── Render card ───────────────────────────────────────────
    function renderCard(animate = true) {
      const area = document.getElementById('stackArea');
      const existing = area.querySelector('.card');
      if (existing) existing.remove();

      updateDeckPill();

      const p = profiles[current];
      if (!p) {
        showEmpty();
        return;
      }

      const score   = p.ai_pick ? p.ai_score : compatibility(current);
      const prompt  = getPrompt(current);
      const vibes   = getVibes(p, current);
      const bgStyle = p.avatar_url
        ? `background-image:url('${esc(p.avatar_url)}');background-color:#1a1440;`
        : `background:${gradients(current)};`;

      const card = document.createElement('div');
      card.className = 'card' + (animate ? ' enter' : '');
      card.innerHTML = `
        <div class="card-like-overlay" id="likeOverlay"></div>
        <div class="card-pass-overlay" id="passOverlay"></div>
        <div class="drag-label like-label" id="likeLabel">LIKE</div>
        <div class="drag-label pass-label" id="passLabel">PASS</div>
        <div class="drag-label super-label" id="superLabel">SUPER ⚡</div>

        <div class="card-bg" style="${bgStyle}"></div>
        <div class="card-gradient"></div>

        ${p.ai_pick ? '<div class="ai-pick-badge">🤖 AI Pick</div>' : ''}

        <div class="card-top">
          <div class="compat-badge">${score}% match</div>
        </div>

        <div class="card-content">
          <div class="card-name-row">
            <div class="card-name">${esc(p.name || 'Someone')}${p.age ? `, ${esc(String(p.age))}` : ''}</div>
            <button class="card-report-btn" onclick="reportUser('${p.user_id}','${esc(p.name || 'Someone')}')" title="Report">⚑</button>
          </div>
          <div class="card-loc">📍 Nearby · Miru</div>
          <div class="card-bio">${esc(p.bio || 'No bio yet — but the vibe is promising.')}</div>
          <div class="card-tags">
            ${vibes.map(v => `<div class="card-tag">${esc(v)}</div>`).join('')}
          </div>
        </div>
      `;

      area.appendChild(card);
      currentCard = card;
      bindDrag(card);
    }

    // ── Drag / swipe logic ────────────────────────────────────
    function bindDrag(card) {
      // Touch
      card.addEventListener('touchstart', onDragStart, { passive: true });
      card.addEventListener('touchmove',  onDragMove,  { passive: false });
      card.addEventListener('touchend',   onDragEnd);
      // Mouse
      card.addEventListener('mousedown',  onDragStart);
      window.addEventListener('mousemove', onDragMove);
      window.addEventListener('mouseup',   onDragEnd);
    }

    function getXY(e) {
      if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }

    function onDragStart(e) {
      if (e.type === 'mousedown') e.preventDefault();
      isDragging = true;
      const { x, y } = getXY(e);
      dragStartX = x;
      dragStartY = y;
      dragX = 0;
      dragY = 0;
      if (currentCard) currentCard.style.transition = 'none';
    }

    function onDragMove(e) {
      if (!isDragging || !currentCard) return;
      if (e.type === 'touchmove') e.preventDefault();

      const { x, y } = getXY(e);
      dragX = x - dragStartX;
      dragY = y - dragStartY;

      const rotate = dragX * 0.08;
      currentCard.style.transform = `translateX(${dragX}px) translateY(${dragY}px) rotate(${rotate}deg)`;

      // Overlay opacities
      const likeOverlay  = currentCard.querySelector('#likeOverlay');
      const passOverlay  = currentCard.querySelector('#passOverlay');
      const superOverlay = currentCard.querySelector('#superLabel');
      const likeLabel    = currentCard.querySelector('#likeLabel');
      const passLabel    = currentCard.querySelector('#passLabel');

      const absX = Math.abs(dragX);
      const absY = Math.abs(dragY);
      const threshold = 60;

      if (dragY < -threshold && absY > absX) {
        // Swiping up = super like
        likeOverlay.style.opacity = '0';
        passOverlay.style.opacity = '0';
        likeLabel.style.opacity   = '0';
        passLabel.style.opacity   = '0';
        superOverlay.style.opacity = Math.min(1, (absY - threshold) / 80);
      } else if (dragX > 0) {
        likeOverlay.style.opacity  = Math.min(0.9, dragX / 120);
        passOverlay.style.opacity  = '0';
        likeLabel.style.opacity    = Math.min(1, dragX / 80);
        passLabel.style.opacity    = '0';
        superOverlay.style.opacity = '0';
      } else {
        passOverlay.style.opacity  = Math.min(0.9, -dragX / 120);
        likeOverlay.style.opacity  = '0';
        passLabel.style.opacity    = Math.min(1, -dragX / 80);
        likeLabel.style.opacity    = '0';
        superOverlay.style.opacity = '0';
      }
    }

    function onDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      window.removeEventListener('mousemove', onDragMove);
      window.removeEventListener('mouseup', onDragEnd);

      if (!currentCard) return;

      const SWIPE_X = 100;
      const SWIPE_Y = -120;

      if (dragX > SWIPE_X) {
        triggerLike();
      } else if (dragX < -SWIPE_X) {
        triggerPass();
      } else if (dragY < SWIPE_Y && Math.abs(dragY) > Math.abs(dragX)) {
        triggerSuper();
      } else {
        // Snap back
        currentCard.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        currentCard.style.transform = 'translateX(0) translateY(0) rotate(0deg)';
        // Reset overlays
        currentCard.querySelectorAll('#likeOverlay,#passOverlay,#likeLabel,#passLabel,#superLabel')
          .forEach(el => el.style.opacity = '0');
      }
    }

    // ── Actions ───────────────────────────────────────────────
    function animatePass()  { triggerPass(); }
    function animateLike()  { triggerLike(); }
    function animateSuper() { triggerSuper(); }

    function triggerPass() {
      if (!currentCard || !profiles[current]) return;
      if (!useSwipe()) return;
      currentCard.style.transition = '';
      currentCard.classList.add('fly-left');
      saveToHistory('pass');
      setTimeout(advance, 420);
    }

    function triggerLike() {
      if (!currentCard || !profiles[current]) return;
      if (!useSwipe()) return;
      currentCard.style.transition = '';
      currentCard.classList.add('fly-right');
      const p = profiles[current];
      saveToHistory('like');
      likeUser(p.user_id, 'like');
      setTimeout(advance, 420);
    }

    function triggerSuper() {
      if (!currentCard || !profiles[current]) return;
      if (!useSwipe()) return;
      currentCard.style.transition = '';
      currentCard.classList.add('fly-up');
      const p = profiles[current];
      saveToHistory('super');
      likeUser(p.user_id, 'super');
      setTimeout(advance, 420);
    }

    function advance() {
      current++;
      renderCard();
    }

    // ── Undo ──────────────────────────────────────────────────
    function saveToHistory(action) {
      history.push({ index: current, action });
    }

    function undoAction() {
      if (!history.length) return;
      const last = history.pop();
      current = last.index;
      renderCard();
    }

    // ── Like / super like in DB ───────────────────────────────
    async function likeUser(targetId, type) {
      // Check if already liked
      const { data: existing } = await sb
        .from('likes')
        .select('id')
        .eq('user_id', me.id)
        .eq('target_user_id', targetId)
        .maybeSingle();

      if (existing) return;

      const { error } = await sb.from('likes').insert({
        user_id:        me.id,
        target_user_id: targetId,
        type
      });

      if (error) { console.error('[likes] insert error:', error.message); return; }

      await maybeCreateConversation(me.id, targetId);
    }

    async function maybeCreateConversation(myId, targetId) {
      // Check for mutual like
      const { data: mutual } = await sb
        .from('likes')
        .select('id')
        .eq('user_id', targetId)
        .eq('target_user_id', myId)
        .limit(1);

      if (!mutual?.length) return;

      // Check if conversation already exists
      const { data: existing } = await sb
        .from('conversations')
        .select('id')
        .or(`and(user_a.eq.${myId},user_b.eq.${targetId}),and(user_a.eq.${targetId},user_b.eq.${myId})`)
        .maybeSingle();

      if (existing) return;

      const { error } = await sb.from('conversations').insert({
        user_a:           myId,
        user_b:           targetId,
        last_message:     'You matched 💜',
        last_message_at:  new Date().toISOString()
      });

      if (error) { console.error('[conversations] insert error:', error.message); return; }

      // Show match modal
      const matchedProfile = allProfiles.find(p => p.user_id === targetId);
      lastMatchedUser = targetId;
      showMatchModal(matchedProfile?.name || 'them');
    }

    // ── Match modal ───────────────────────────────────────────
    function showMatchModal(name) {
      document.getElementById('matchName').textContent = name;
      document.getElementById('matchModal').classList.add('visible');
    }

    function closeMatchModal() {
      document.getElementById('matchModal').classList.remove('visible');
    }

    function goToMessages() {
      window.location.href = 'messages.html';
    }

    // ── UI helpers ────────────────────────────────────────────
    function updateDeckPill() {
      const left = Math.max(profiles.length - current, 0);
      document.getElementById('deckPill').textContent = `${left} nearby`;
    }

    function showLoading(on) {
      document.getElementById('loadingState').style.display = on ? 'flex' : 'none';
    }

    function showEmpty(msg) {
      const area = document.getElementById('stackArea');
      const existing = area.querySelector('.card');
      if (existing) existing.remove();
      area.innerHTML = `
        <div class="ghost ghost-2"></div>
        <div class="ghost ghost-1"></div>
        <div class="loading-state" id="loadingState" style="display:none"></div>
        <div class="empty-state">
          <div class="empty-emoji">✨</div>
          <div class="empty-title">You're all caught up.</div>
          <div class="empty-body">${esc(msg || 'You\'ve seen everyone nearby. Check back later or adjust your filters.')}</div>
        </div>
      `;
    }

    // ── Report user ───────────────────────────────────────────
    let reportUserId = null;
    let reportUserName = null;

    function reportUser(userId, name) {
      reportUserId = userId;
      reportUserName = name;
      document.getElementById('reportTitle').textContent = `Report ${name}`;
      const backdrop = document.getElementById('reportBackdrop');
      backdrop.style.display = 'flex';
    }

    function closeReport(e) {
      if (e && e.target !== document.getElementById('reportBackdrop')) return;
      document.getElementById('reportBackdrop').style.display = 'none';
      reportUserId = null;
      reportUserName = null;
    }

    async function submitReport(reason) {
      document.getElementById('reportBackdrop').style.display = 'none';
      try {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        await sb.from('blocked_users').insert({
          blocker_id: user.id,
          blocked_id: reportUserId
        }).onConflict('blocker_id,blocked_id').ignore();
      } catch(e) {}
      showToast(`${reportUserName} reported and blocked.`, 'info');
      reportUserId = null;
      reportUserName = null;
      animatePass();
    }

    init();
  </script>
  <script>
    // ── Paywall ───────────────────────────────────────────────
    function showPaywall() {
      if (document.getElementById('swipePaywall')) return;

      const modal = document.createElement('div');
      modal.id = 'swipePaywall';
      modal.innerHTML = `
        <div class="pw-backdrop" onclick="closePaywall()"></div>
        <div class="pw-card">
          <div class="pw-icon">⏰</div>
          <div class="pw-title">Out of swipes<br/><em>for today.</em></div>
          <div class="pw-sub">You've used all your swipes for today. Come back tomorrow — new people are always joining.</div>
          <button class="pw-skip" onclick="closePaywall()">Got it — close</button>
          <div class="pw-reset">Swipes reset in <span id="pwTimer">--:--:--</span></div>
        </div>
      `;
      document.body.appendChild(modal);

      // Countdown timer
      const timerEl = document.getElementById('pwTimer');
      const timerInterval = setInterval(() => {
        if (!document.getElementById('pwTimer')) { clearInterval(timerInterval); return; }
        const now = new Date();
        const midnight = new Date(); midnight.setHours(24,0,0,0);
        let diff = Math.floor((midnight - now) / 1000);
        if (diff < 0) diff = 0;
        const h = String(Math.floor(diff/3600)).padStart(2,'0');
        const m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
        const s = String(diff%60).padStart(2,'0');
        if (timerEl) timerEl.textContent = `${h}:${m}:${s}`;
      }, 1000);
    }

    function closePaywall() {
      const el = document.getElementById('swipePaywall');
      if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; setTimeout(() => el.remove(), 220); }
    }
  </script>

  <style>

      display: flex; align-items: flex-end; padding: 14px;
      animation: pwFadeIn 0.25s ease both;

    @keyframes pwFadeIn { from { opacity:0; } to { opacity:1; } }

    .pw-backdrop {
      position: absolute; inset: 0;
      background: rgba(5,3,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .pw-card {
      position: relative; z-index: 1;

      border-radius: 32px; padding: 26px 22px 22px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      animation: pwCardIn 0.38s cubic-bezier(0.34,1.4,0.64,1) both;
      animation-delay: 0.06s;
    }
    @keyframes pwCardIn {
      from { transform: translateY(50px); opacity:0; }
      to   { transform: translateY(0);    opacity:1; }
    }

    .pw-icon { font-size: 42px; text-align: center; margin-bottom: 12px; }

    .pw-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 700; line-height: 0.95;
      letter-spacing: -1px; color: #FFFFFF; text-align: center; margin-bottom: 10px;
    }
    .pw-title em { font-style: italic; color: #B8AEFF; }

    .pw-sub {
      font-size: 14px; line-height: 1.65; color: #C4BCEE;
      text-align: center; margin-bottom: 18px;
    }
    .pw-sub strong { color: #FFFFFF; }

    .pw-perks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

    .pw-perk {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(180,170,255,0.12);
    }
    .pw-perk-icon { font-size: 18px; flex-shrink: 0; }
    .pw-perk-text strong { display: block; color: #FFFFFF; font-size: 13px; font-weight: 800; margin-bottom: 1px; }
    .pw-perk-text span   { font-size: 11px; color: #7A72AA; font-weight: 700; }

    .pw-price-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 14px;
    }
    .pw-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px; font-weight: 700; color: #F5CE7A;
      letter-spacing: -1px; line-height: 1;
    }
    .pw-price-sub { font-size: 13px; color: #7A72AA; font-weight: 700; line-height: 1.4; }

    .pw-cta {
      width: 100%; padding: 16px; border-radius: 999px;
      background: #FFFFFF; color: #0A0714;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 15px; font-weight: 900; border: none; cursor: pointer;
      box-shadow: 0 10px 32px rgba(255,255,255,0.18);
      margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .pw-cta:hover { transform: translateY(-1px); box-shadow: 0 14px 40px rgba(255,255,255,0.24); }

    .pw-skip {
      width: 100%; padding: 13px; border-radius: 999px;
      background: transparent; color: #7A72AA;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      border: 1px solid rgba(180,170,255,0.14); cursor: pointer;
      transition: color 0.15s;
    }
    .pw-skip:hover { color: #C4BCEE; }

    .pw-reset {
      text-align: center; font-size: 11px; color: #7A72AA;
      font-weight: 700; margin-top: 12px;
    }
    .pw-reset span { color: #B8AEFF; font-variant-numeric: tabular-nums; }
  </style>

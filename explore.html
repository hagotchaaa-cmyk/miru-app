<!DOCTYPE html>
<html lang="en">
<head>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miru — Explore</title>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f0f0f,#1a102d,#2d1b69);
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

.feed{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

.card-bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.content{
  position:absolute;
  bottom:120px;
  left:15px;
}

.name{font-size:24px;font-weight:bold;}
.bio{font-size:14px;color:#ccc;}

.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.btn{
  width:60px;height:60px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  cursor:pointer;
  font-size:20px;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.show{
  opacity:1;
  pointer-events:all;
}

.popup h1{
  color:#9F7AEA;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<div class="popup" id="popup">
  <h1>🔥 It's a Match</h1>
</div>

<script>
const { createClient } = supabase;

const sb = createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

const feed = document.getElementById("feed");

// LOAD USERS
async function loadUsers(){
  const { data: users } = await sb
    .from("profiles")
    .select("*");

  feed.innerHTML = "";

  users.forEach(user => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-bg" style="background-image:url('${user.avatar_url || ''}')"></div>
      <div class="overlay"></div>

      <div class="content">
        <div class="name">${user.name || "User"}, ${user.age || ""}</div>
        <div class="bio">${user.bio || ""}</div>
      </div>

      <div class="actions">
        <div class="btn" onclick="pass()">✕</div>
        <div class="btn" onclick="superLike('${user.user_id}')">⚡</div>
        <div class="btn" onclick="like('${user.user_id}')">❤️</div>
        <div class="btn" onclick="openProfile('${user.user_id}')">👤</div>
      </div>
    `;

    feed.appendChild(card);
  });
}

// LIKE
async function like(targetId){
  const { data: { user } } = await sb.auth.getUser();

  await sb.from("likes").insert({
    user_id: user.id,
    target_user_id: targetId,
    type: "like"
  });

  checkMatch(user.id, targetId);
}

// SUPER LIKE
async function superLike(targetId){
  const { data: { user } } = await sb.auth.getUser();

  await sb.from("likes").insert({
    user_id: user.id,
    target_user_id: targetId,
    type: "super"
  });

  checkMatch(user.id, targetId);
}

// MATCH CHECK
async function checkMatch(me, them){
  const { data } = await sb
    .from("likes")
    .select("*")
    .eq("user_id", them)
    .eq("target_user_id", me);

  if (data.length > 0){
    document.getElementById("popup").classList.add("show");
  }
}

// PASS
function pass(){
  window.scrollBy(0, window.innerHeight);
}

// PROFILE
function openProfile(id){
  window.location.href = "profile.html?user=" + id;
}

// START
loadUsers();
</script>

</body>
</html>

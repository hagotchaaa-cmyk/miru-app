<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miru — Join Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #7C5CBF;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background-color: white;
      color: black;
      border-radius: 8px;
      padding: 40px;
      width: 300px;
      text-align: center;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }
    .logo {
      font-size: 30px;
      font-weight: bold;
      color: #7C5CBF;
    }
    .sub {
      color: gray;
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 15px;
    }
    .field input {
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .btn {
      padding: 12px;
      background-color: #7C5CBF;
      color: white;
      width: 100%;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn.ghost {
      background-color: transparent;
      border: 1px solid #7C5CBF;
      color: #7C5CBF;
    }
    .note {
      color: red;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">miru.</div>
    <div class="sub">Join free and start meeting real people.</div>
    <div class="field">
      <input id="email" type="email" placeholder="Email" required>
    </div>
    <div class="field">
      <input id="password" type="password" placeholder="Password" required>
    </div>
    <button class="btn" onclick="signUp()">Create account</button>
    <button class="btn ghost" onclick="signIn()">Log in</button>
    <div class="note" id="msg"></div>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) return alert(error.message);
      alert("Account created. Check your email.");
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);
      window.location.href = "index.html"; // Redirect to homepage after login
    }
  </script>
</body>
</html>

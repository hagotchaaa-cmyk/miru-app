<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miru — Join Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Basic styling for the auth page */
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #7C5CBF;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }
    .card {
      background-color: white;
      color: black;
      border-radius: 8px;
      padding: 40px;
      width: 300px;
      text-align: center;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }
    .logo {
      font-size: 30px;
      font-weight: bold;
      color: #7C5CBF;
    }
    .sub {
      color: gray;
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 15px;
    }
    .field input {
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .btn {
      padding: 12px;
      background-color: #7C5CBF;
      color: white;
      width: 100%;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn.ghost {
      background-color: transparent;
      border: 1px solid #7C5CBF;
      color: #7C5CBF;
    }
    .note {
      color: red;
      margin-top: 15px;
    }
    .social-btns {
      margin-top: 20px;
    }
    .social-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #db4437;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 25px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .social-btn img {
      margin-right: 10px;
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Miru Logo -->
    <div class="logo">
      <img src="/path/to/your/icon.png" alt="Miru Logo" style="width: 50px; height: 50px;"> <!-- Add the icon -->
      miru.
    </div>
    <div class="sub">Join free and start meeting real people.</div>
    
    <!-- Email/Password Login -->
    <div class="field">
      <input id="email" type="email" placeholder="Email" required>
    </div>
    <div class="field">
      <input id="password" type="password" placeholder="Password" required>
    </div>
    <button class="btn" onclick="signUp()">Create account</button>
    <button class="btn ghost" onclick="signIn()">Log in</button>
    
    <!-- Social login (Google) -->
    <div class="social-btns">
      <button class="social-btn" onclick="signInWithGoogle()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Google_%22G%22_Logo.svg/512px-Google_%22G%22_Logo.svg.png" alt="Google logo"> 
        Sign in with Google
      </button>
    </div>

    <div class="note" id="msg"></div>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    // Sign up new user with email/password
    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) return alert(error.message);

      // Insert default profile
      await sb.from("profiles").insert({
        user_id: data.user.id,
        name: email.split('@')[0], // Default name from email
        age: 25, // Default age
        bio: "This is a new user.", // Default bio
        avatar_url: "default-avatar.jpg" // Default avatar image
      });

      alert("Account created. Check your email.");
    }

    // Sign in user with email/password
    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);
      window.location.href = "index.html"; // Redirect to homepage after login
    }

    // Google Sign In
    async function signInWithGoogle() {
      const { data, error } = await sb.auth.signInWithOAuth({
        provider: "google",
      });
      if (error) return alert(error.message);
      window.location.href = "index.html"; // Redirect to homepage after Google login
    }
  </script>
</body>
</html>

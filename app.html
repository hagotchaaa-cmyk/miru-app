<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  overflow: hidden;
  font-family: sans-serif;
}

.feed {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.card {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

.card video, .card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  position: absolute;
  bottom: 120px;
  left: 15px;
}

.actions {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.btn {
  background: rgba(0,0,0,0.5);
  padding: 14px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<script>
const { createClient } = supabase;

const sb = createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

let startX = 0;

// LOAD USERS (NOT POSTS)
async function loadFeed(){
  const { data: users } = await sb
    .from("profiles")
    .select("*");

  const feed = document.getElementById("feed");

  users.forEach(user => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = user.avatar_url || "";

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `
      <div>${user.name || "User"}, ${user.age || ""}</div>
      <div>${user.bio || ""}</div>
    `;

    const actions = document.createElement("div");
    actions.className = "actions";
    actions.innerHTML = `
      <div class="btn" onclick="like('${user.user_id}')">❤️</div>
      <div class="btn" onclick="pass()">❌</div>
      <div class="btn" onclick="superLike('${user.user_id}')">⭐</div>
      <div class="btn" onclick="openProfile('${user.user_id}')">👤</div>
    `;

    div.appendChild(img);
    div.appendChild(info);
    div.appendChild(actions);

    // SWIPE DETECTION
    div.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
    });

    div.addEventListener("touchend", e => {
      let endX = e.changedTouches[0].clientX;

      if (endX - startX > 50){
        like(user.user_id);
      } else if (startX - endX > 50){
        pass();
      }
    });

    feed.appendChild(div);
  });
}

// LIKE SYSTEM
async function like(targetId){
  const { data: { user } } = await sb.auth.getUser();

  await sb.from("likes").insert({
    user_id: user.id,
    target_user_id: targetId,
    type: "like"
  });

  checkMatch(user.id, targetId);
}

// SUPER LIKE
async function superLike(targetId){
  const { data: { user } } = await sb.auth.getUser();

  await sb.from("likes").insert({
    user_id: user.id,
    target_user_id: targetId,
    type: "super"
  });

  checkMatch(user.id, targetId);
}

// PASS
function pass(){
  window.scrollBy(0, window.innerHeight);
}

// MATCH CHECK
async function checkMatch(me, them){
  const { data } = await sb
    .from("likes")
    .select("*")
    .eq("user_id", them)
    .eq("target_user_id", me);

  if (data.length > 0){
    alert("🔥 IT'S A MATCH!");
  }
}

// OPEN PROFILE
function openProfile(id){
  window.location.href = "profile.html?user=" + id;
}

loadFeed();
</script>

</body>
</html>

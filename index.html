<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miru — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #7C5CBF;
      color: white;
      padding: 0;
      margin: 0;
    }
    .hero {
      text-align: center;
      padding: 50px;
    }
    .cards-preview {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .match-card {
      width: 200px;
      padding: 20px;
      background-color: #fff;
      color: black;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    .match-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
    .match-card .name {
      font-weight: bold;
      margin-top: 10px;
    }
    .actions button {
      padding: 12px;
      background-color: #7C5CBF;
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Welcome to Miru</h1>
    <p>Stop swiping. Start living.</p>
  </div>

  <div class="cards-preview" id="previewCards">
    <!-- User profiles will appear here -->
  </div>

  <div class="actions">
    <button onclick="loadMatches()">See Matches</button>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    async function loadMatches(){
      const { data, error } = await sb.from("profiles").select("*").limit(6);
      if (error) return alert("Error loading matches");

      const cardsContainer = document.getElementById("previewCards");
      cardsContainer.innerHTML = "";

      data.forEach(profile => {
        cardsContainer.innerHTML += `
          <div class="match-card">
            <img src="${profile.avatar_url || 'default-avatar.jpg'}" alt="Profile Picture">
            <div class="name">${profile.name}</div>
            <div>${profile.age} | ${profile.bio}</div>
            <button onclick="likeUser('${profile.user_id}')">Like</button>
          </div>
        `;
      });
    }

    async function likeUser(targetId){
      const { error } = await sb.from("likes").insert({
        user_id: me.id,
        target_user_id: targetId,
        type: "like"
      });
      if (error) return alert("Error liking user");
    }

    loadMatches();
  </script>
</body>
</html>

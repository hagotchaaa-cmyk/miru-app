<!DOCTYPE html>
<html lang="en">
<head>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miru App</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}

/* HIDE VIEWS */
.view{display:none;}
.view.active{display:block;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

/* PROFILE */
.profile{text-align:center;padding:40px;}
.avatar{width:120px;height:120px;border-radius:50%;background:#222;margin:auto;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:20px;}
.grid img,.grid video{width:100%;height:120px;object-fit:cover;}

/* EXPLORE */
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;}
.card{height:100vh;position:relative;scroll-snap-align:start;}
.card-bg{position:absolute;inset:0;background-size:cover;}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,black,transparent);}
.content{position:absolute;bottom:140px;left:20px;}
.actions{position:absolute;right:15px;bottom:140px;display:flex;flex-direction:column;gap:15px;}
.btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;}

</style>
</head>

<body>

<!-- EXPLORE -->
<div id="exploreView" class="view active">
  <div class="feed" id="feed"></div>
</div>

<!-- PROFILE -->
<div id="profileView" class="view">
  <div class="profile">
    <div class="avatar"><img id="avatar" width="100%"></div>
    <h2 id="name"></h2>
    <p id="bio"></p>
    <button onclick="addPost()">➕ Add Post</button>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- MESSAGES (placeholder) -->
<div id="messagesView" class="view">
  <h2 style="padding:20px">💬 Messages coming soon</h2>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showView('exploreView')">🔥</div>
  <div onclick="showView('messagesView')">💬</div>
  <div onclick="showView('profileView')">👤</div>
</div>

<script>
const sb = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

/* NAV SWITCH */
function showView(id){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* AUTH CHECK */
async function getUser(){
  const { data:{user} } = await sb.auth.getUser();
  if(!user){
    alert("Login required");
    return null;
  }
  return user;
}

/* PROFILE */
async function loadProfile(){
  const user = await getUser();
  if(!user) return;

  let { data } = await sb.from("profiles").select("*").eq("user_id", user.id);

  let profile = data?.[0];

  if(!profile){
    await sb.from("profiles").insert({user_id:user.id,name:"New User"});
    let res = await sb.from("profiles").select("*").eq("user_id", user.id);
    profile = res.data?.[0];
  }

  document.getElementById("name").textContent = profile?.name || "User";
  document.getElementById("bio").textContent = profile?.bio || "";

  if(profile?.avatar_url){
    document.getElementById("avatar").src = profile.avatar_url;
  }
}

/* POSTS */
async function loadPosts(){
  const user = await getUser();
  if(!user) return;

  let { data } = await sb.from("posts").select("*").eq("user_id", user.id);

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  data?.forEach(p=>{
    let el = document.createElement(p.media_type==="video"?"video":"img");
    el.src = p.media_url;
    if(p.media_type==="video"){el.autoplay=true;el.loop=true;el.muted=true;}
    grid.appendChild(el);
  });
}

async function addPost(){
  const input = document.createElement("input");
  input.type="file";

  input.onchange = async e=>{
    const file = e.target.files[0];
    const user = await getUser();

    const path = `${user.id}/${Date.now()}_${file.name}`;

    await sb.storage.from("posts").upload(path,file);

    const url = `${window.SUPABASE_URL}/storage/v1/object/public/posts/${path}`;

    await sb.from("posts").insert({
      user_id:user.id,
      media_url:url,
      media_type:file.type.includes("video")?"video":"image"
    });

    loadPosts();
  };

  input.click();
}

/* EXPLORE */
async function loadUsers(){
  const user = await getUser();
  if(!user) return;

  const { data: users } = await sb
    .from("profiles")
    .select("user_id,name,bio,avatar_url,boost_until")
    .neq("user_id", user.id)
    .order("boost_until",{ascending:false});

  const feed = document.getElementById("feed");
  feed.innerHTML="";

  users.forEach(u=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="card-bg" style="background-image:url('${u.avatar_url||''}')"></div>
      <div class="overlay"></div>
      <div class="content">
        <h2>${u.name||"User"}</h2>
        <p>${u.bio||""}</p>
      </div>
      <div class="actions">
        <div class="btn" onclick="pass()">✕</div>
        <div class="btn" onclick="like('${u.user_id}')">❤</div>
      </div>
    `;

    enableDrag(card,u.user_id);
    feed.appendChild(card);
  });
}

async function like(id){
  const user = await getUser();

  const { data: existing } = await sb
    .from("likes")
    .select("*")
    .eq("user_id", user.id)
    .eq("target_user_id", id)
    .maybeSingle();

  if(existing) return;

  await sb.from("likes").insert({
    user_id:user.id,
    target_user_id:id,
    type:"like"
  });

  swipeNext();
}

function pass(){ swipeNext(); }

function swipeNext(){
  const card=document.querySelector(".card");
  if(card){
    card.style.transform="translateX(100%)";
    setTimeout(()=>card.remove(),200);
  }
}

function enableDrag(card,id){
  let startX=0;

  card.addEventListener("pointerdown",e=>startX=e.clientX);

  card.addEventListener("pointerup",e=>{
    let diff=e.clientX-startX;
    if(diff>100) like(id);
    if(diff<-100) pass();
  });
}

/* INIT */
loadProfile();
loadPosts();
loadUsers();

</script>

</body>
</html>

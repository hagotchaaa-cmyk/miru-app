<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

.top {
  display: flex;
  padding: 20px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #333;
}

.info {
  margin-left: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

.grid img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="top">
  <div class="avatar"></div>
  <div class="info">
    <h2 id="name">Profile</h2>
    <p id="bio"></p>
  </div>
</div>

<div class="grid" id="grid"></div>

</body>
</html>

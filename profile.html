<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miru — Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Inter', -apple-system, sans-serif;
      background: radial-gradient(circle at top,#1a102d,#0f0f0f);
      color:white;
    }

    .profile{
      text-align:center;
      padding:40px 20px 20px;
    }

    .avatar{
      width:140px;
      height:140px;
      margin:auto;
      border-radius:50%;
      overflow:hidden;
      border:3px solid #9F7AEA;
      box-shadow:0 10px 30px rgba(159,122,234,0.3);
      background:#222;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      font-size:26px;
      font-weight:700;
      margin-top:12px;
    }

    .bio{
      color:#aaa;
      margin-top:6px;
      max-width:420px;
      margin-left:auto;
      margin-right:auto;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      margin-top:20px;
      padding:15px 0;
      background:rgba(255,255,255,0.03);
    }

    .actions{
      display:flex;
      gap:10px;
      padding:15px;
    }

    .btn{
      flex:1;
      padding:12px;
      border-radius:25px;
      background:linear-gradient(45deg,#9F7AEA,#6EE7B7);
      text-align:center;
      cursor:pointer;
      font-weight:600;
      color:black;
      border:none;
      font-size:15px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:3px;
      padding-bottom:20px;
    }

    .grid img,
    .grid video{
      width:100%;
      height:130px;
      object-fit:cover;
      display:block;
      background:#111;
    }
  </style>
</head>

<body>

<div class="profile">
  <div class="avatar">
    <img id="avatar" src="" alt="Profile avatar">
  </div>

  <div class="name" id="name">Loading profile...</div>
  <div class="bio" id="bio"></div>
</div>

<div class="stats">
  <div><span id="mediaCount">0</span><br><small>MEDIA</small></div>
  <div><span id="matchCount">0</span><br><small>MATCHES</small></div>
  <div><span id="convoCount">0</span><br><small>CONVOS</small></div>
</div>

<div class="actions">
  <button class="btn" onclick="addPost()">➕ Add</button>
  <button class="btn" onclick="window.location.href='edit-profile.html'">✏️ Edit</button>
</div>

<div class="grid" id="grid"></div>

<script>
const sb = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_ANON_KEY || window.SUPABASE_KEY
);

async function getCurrentUser() {
  const { data, error } = await sb.auth.getUser();
  if (error || !data?.user) {
    window.location.href = "auth.html";
    return null;
  }
  return data.user;
}

async function loadProfile() {
  try {
    const user = await getCurrentUser();
    if (!user) return;

    const { data, error } = await sb
      .from("profiles")
      .select("*")
      .eq("user_id", user.id)
      .limit(1);

    if (error) throw error;

    let profile = data && data.length ? data[0] : null;

    if (!profile) {
      const { error: insertError } = await sb.from("profiles").insert({
        user_id: user.id,
        name: user.email ? user.email.split("@")[0] : "New User",
        bio: "",
        avatar_url: ""
      });

      if (insertError) throw insertError;

      const { data: again, error: againError } = await sb
        .from("profiles")
        .select("*")
        .eq("user_id", user.id)
        .limit(1);

      if (againError) throw againError;
      profile = again?.[0] || null;
    }

    document.getElementById("name").textContent = profile?.name || "User";
    document.getElementById("bio").textContent = profile?.bio || "No bio yet";

    if (profile?.avatar_url) {
      document.getElementById("avatar").src = profile.avatar_url;
    } else {
      document.getElementById("avatar").src = "";
    }

  } catch (e) {
    console.error("loadProfile error:", e);
    document.getElementById("name").textContent = "Error loading profile";
  }
}

async function loadPosts() {
  try {
    const user = await getCurrentUser();
    if (!user) return;

    const { data, error } = await sb
      .from("posts")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    if (error) throw error;

    const posts = data || [];
    document.getElementById("mediaCount").textContent = posts.length;

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    posts.forEach(p => {
      let el;

      if (p.media_type === "video") {
        el = document.createElement("video");
        el.src = p.media_url;
        el.autoplay = true;
        el.loop = true;
        el.muted = true;
        el.playsInline = true;
      } else {
        el = document.createElement("img");
        el.src = p.media_url;
        el.alt = "Post";
      }

      grid.appendChild(el);
    });

  } catch (e) {
    console.error("loadPosts error:", e);
  }
}

async function loadStats() {
  try {
    const user = await getCurrentUser();
    if (!user) return;

    const { count: matchCount } = await sb
      .from("likes")
      .select("*", { count: "exact", head: true })
      .eq("target_user_id", user.id);

    document.getElementById("matchCount").textContent = matchCount || 0;

    const { count: convoCount } = await sb
      .from("conversations")
      .select("*", { count: "exact", head: true })
      .or(`user_a.eq.${user.id},user_b.eq.${user.id}`);

    document.getElementById("convoCount").textContent = convoCount || 0;

  } catch (e) {
    console.error("loadStats error:", e);
  }
}

async function addPost() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*,video/*";

  input.onchange = async e => {
    try {
      const file = e.target.files[0];
      if (!file) return;

      const user = await getCurrentUser();
      if (!user) return;

      const path = `${user.id}/${Date.now()}_${file.name}`;

      const { error: uploadError } = await sb.storage
        .from("posts")
        .upload(path, file);

      if (uploadError) throw uploadError;

      const url = `${window.SUPABASE_URL}/storage/v1/object/public/posts/${path}`;

      const { error: insertError } = await sb.from("posts").insert({
        user_id: user.id,
        media_url: url,
        media_type: file.type.includes("video") ? "video" : "image"
      });

      if (insertError) throw insertError;

      await loadPosts();
      await loadStats();

    } catch (err) {
      console.error("addPost error:", err);
      alert(err.message || "Upload failed");
    }
  };

  input.click();
}

async function init() {
  await loadProfile();
  await loadPosts();
  await loadStats();
}

init();
</script>

</body>
</html>

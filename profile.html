<!DOCTYPE html>
<html lang="en">
<head>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

/* TOP PROFILE */
.top{
  display:flex;
  padding:20px;
  align-items:center;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  background:#222;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.info{
  margin-left:20px;
}

.name{
  font-size:20px;
  font-weight:bold;
}

.bio{
  color:#aaa;
  font-size:14px;
  margin-top:5px;
}

/* STATS */
.stats{
  display:flex;
  gap:20px;
  margin-top:10px;
  font-size:14px;
}

.stat{
  text-align:center;
}

/* BUTTON */
.edit-btn{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#7C5CBF,#9F7AEA);
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid img,
.grid video{
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="top">
  <div class="avatar">
    <img id="avatar">
  </div>

  <div class="info">
    <div class="name" id="name">Loading...</div>
    <div class="bio" id="bio"></div>

    <div class="stats">
      <div class="stat">
        <div id="postCount">0</div>
        Posts
      </div>
      <div class="stat">
        <div>0</div>
        Likes
      </div>
    </div>

    <button class="edit-btn" onclick="editProfile()">Edit Profile</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const { createClient } = supabase;

const sb = createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

const params = new URLSearchParams(window.location.search);
const userIdFromUrl = params.get("user");

// LOAD PROFILE
async function loadProfile(){
  let userId = userIdFromUrl;

  if (!userId) {
    const { data: { user } } = await sb.auth.getUser();

    if (!user) {
      alert("Not logged in");
      return;
    }

    userId = user.id;
  }

  const { data } = await sb
    .from("profiles")
    .select("*")
    .eq("user_id", userId)
    .single();

  if (data){
    document.getElementById("name").textContent = data.name || "User";
    document.getElementById("bio").textContent = data.bio || "";

    if (data.avatar_url){
      document.getElementById("avatar").src = data.avatar_url;
    }
  }
}

// LOAD POSTS
async function loadPosts(){
  let userId = userIdFromUrl;

  if (!userId) {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    userId = user.id;
  }

  const { data } = await sb
    .from("posts")
    .select("*")
    .eq("user_id", userId);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  document.getElementById("postCount").textContent = data.length;

  data.forEach(post => {
    let el;

    if(post.media_type === "video"){
      el = document.createElement("video");
      el.src = post.media_url;
      el.muted = true;
      el.autoplay = true;
      el.loop = true;
    } else {
      el = document.createElement("img");
      el.src = post.media_url;
    }

    grid.appendChild(el);
  });
}

// EDIT PROFILE BUTTON
function editProfile(){
  window.location.href = "edit-profile.html";
}

// RUN
loadProfile();
loadPosts();
</script>

</body>
</html>

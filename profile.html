<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miru — Profile</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #7C5CBF;
      color: white;
      padding: 0;
      margin: 0;
    }
    .profile {
      text-align: center;
      padding: 40px 20px;
    }
    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 20px auto;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(159, 122, 234, 0.3);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .name {
      font-size: 28px;
      font-weight: 700;
      margin-top: 12px;
    }
    .bio {
      color: #bbb;
      margin-top: 6px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
    .actions {
      padding: 20px;
    }
    .btn {
      padding: 12px;
      background-color: #7C5CBF;
      color: white;
      width: 100%;
      border: none;
      border-radius: 25px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="profile">
    <div class="avatar">
      <img id="avatar" src="" alt="Profile avatar">
    </div>
    <div class="name" id="name">Loading...</div>
    <div class="bio" id="bio">Loading bio...</div>
    <button onclick="uploadProfilePic()">Upload Profile Picture</button>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    let me = null;

    async function getUser() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) {
        window.location.href = "auth.html";
        return null;
      }
      return user;
    }

    async function loadProfile() {
      me = await getUser();
      const { data, error } = await sb.from("profiles").select("*").eq("user_id", me.id).maybeSingle();
      if (data) {
        document.getElementById("name").textContent = data.name || "No name set";
        document.getElementById("bio").textContent = data.bio || "No bio yet";
        document.getElementById("avatar").src = data.avatar_url || "default-avatar.jpg";
      } else {
        // Insert default profile if not exists
        await sb.from("profiles").insert({
          user_id: me.id,
          name: "New User",
          age: 25,
          bio: "This is a new user.",
          avatar_url: "default-avatar.jpg"
        });
      }
    }

    async function uploadProfilePic() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.onchange = async (e) => {
        const file = e.target.files[0];
        const path = `${me.id}/avatar/${Date.now()}_${file.name}`;
        await sb.storage.from("avatars").upload(path, file);
        const url = `${window.SUPABASE_URL}/storage/v1/object/public/avatars/${path}`;
        await sb.from("profiles").update({ avatar_url: url }).eq("user_id", me.id);
        document.getElementById("avatar").src = url;
      };
      input.click();
    }

    loadProfile();
  </script>
</body>
</html>

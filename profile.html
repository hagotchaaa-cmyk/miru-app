<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F8F6FF">
<title>Miru — My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F8F6FF;--surface:#fff;--surface2:#F0ECFF;--border:#E4DEFF;--purple:#7C5CBF;--purple-mid:#9B7FD4;--purple-pale:#EDE8FF;--text:#1A1528;--text2:#6B5F8A;--text3:#A99DC0;--like:#FF5E7A;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;--radius:16px;--radius-pill:999px;--shadow:0 2px 20px rgba(124,92,191,0.08);}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:rgba(248,246,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-back{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);}
.nav-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text);}
.nav-menu{width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--text);position:relative;}
.menu-dd{position:absolute;top:48px;right:0;width:200px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:200;display:none;overflow:hidden;}
.menu-dd.show{display:block;}
.menu-item{padding:.85rem 1rem;font-size:14px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem;}
.menu-item:last-child{border-bottom:none;}
.menu-item.danger{color:#CC3355;}
main{max-width:480px;margin:0 auto;padding:0 0 5rem;}
.profile-top{padding:1.5rem 1.25rem 1rem;text-align:center;background:#fff;}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:.75rem;}
.avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-mid));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:36px;font-weight:700;color:#fff;border:3px solid #fff;box-shadow:0 4px 20px rgba(124,92,191,.2);}
.avatar-add{position:absolute;bottom:2px;right:2px;width:26px;height:26px;border-radius:50%;background:var(--purple);border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;cursor:pointer;}
.profile-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.profile-loc{font-size:13px;color:var(--text3);margin-bottom:.75rem;}
.profile-bio{font-size:14px;color:var(--text2);line-height:1.6;max-width:300px;margin:0 auto .75rem;}
.premium-badge{display:inline-flex;align-items:center;gap:.35rem;padding:4px 12px;border-radius:var(--radius-pill);background:linear-gradient(135deg,#F5A623,#E8920A);color:#fff;font-size:11px;font-weight:700;margin-bottom:.75rem;}
.stats{display:flex;justify-content:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat{flex:1;text-align:center;padding:.75rem 0;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-num{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.profile-btns{display:flex;gap:.65rem;padding:.75rem 1.25rem;background:#fff;border-bottom:1px solid var(--border);}
.btn-edit{flex:2;padding:.75rem;border-radius:var(--radius-pill);background:var(--purple);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;border:none;cursor:pointer;}
.btn-media{flex:1;padding:.75rem;border-radius:var(--radius-pill);background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;}
.media-tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;}
.mtab{flex:1;padding:.85rem;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;}
.mtab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:600;}
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.grid-item{aspect-ratio:9/16;position:relative;overflow:hidden;cursor:pointer;}
.gi-bg{width:100%;height:100%;}
.g1{background:linear-gradient(145deg,#ede6ff,#d8ccff);}
.g2{background:linear-gradient(145deg,#ffe6f0,#ffd0e4);}
.g3{background:linear-gradient(145deg,#e6f0ff,#d0e4ff);}
.gi-type{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:var(--radius-pill);font-size:9px;font-weight:600;background:rgba(255,255,255,.88);color:var(--purple);}
.empty-grid{grid-column:1/-1;padding:2rem;text-align:center;background:#fff;}
.eg-icon{font-size:40px;margin-bottom:.75rem;}
.eg-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.4rem;}
.eg-sub{font-size:13px;color:var(--text3);margin-bottom:1.25rem;line-height:1.6;}
.eg-btn{padding:.75rem 1.5rem;border-radius:var(--radius-pill);background:var(--purple);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;border:none;cursor:pointer;}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;margin:2rem auto;display:block;}
@keyframes sp{to{transform:rotate(360deg);}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:space-around;align-items:center;padding:.75rem 0 1.25rem;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);}
.bnav{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.25rem .75rem;}
.bnav:active{transform:scale(.9);}
.bnav-icon{font-size:21px;color:var(--text3);}
.bnav-label{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);}
.bnav.active .bnav-icon,.bnav.active .bnav-label{color:var(--purple);}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-back" onclick="window.location.href='app.html'">←</div>
  <div class="nav-title">My Profile</div>
  <div class="nav-menu" id="menuBtn" onclick="toggleMenu()">☰
    <div class="menu-dd" id="menuDd">
      <div class="menu-item" onclick="window.location.href='onboarding.html'">✏️ Edit profile</div>
      <div class="menu-item" onclick="window.location.href='video.html'">🎥 Add video</div>
      <div class="menu-item" onclick="window.location.href='privacy.html'">🔒 Privacy</div>
      <div class="menu-item" onclick="window.location.href='terms.html'">📄 Terms</div>
      <div class="menu-item" onclick="logout()">🚪 Sign out</div>
      <div class="menu-item danger" onclick="window.location.href='delete-account.html'">🗑️ Delete account</div>
    </div>
  </div>
</div>
<main id="main"><div class="spin"></div></main>
<div class="bottom-nav">
  <div class="bnav" onclick="window.location.href='app.html'"><div class="bnav-icon">💜</div><div class="bnav-label">Matches</div></div>
  <div class="bnav" onclick="window.location.href='messages.html'"><div class="bnav-icon">💬</div><div class="bnav-label">Messages</div></div>
  <div class="bnav" onclick="window.location.href='explore.html'"><div class="bnav-icon">🔍</div><div class="bnav-label">Explore</div></div>
  <div class="bnav active"><div class="bnav-icon">👤</div><div class="bnav-label">Profile</div></div>
</div>
<script>
const {createClient}=supabase;
const sb=createClient('https://rlmcwbaiuowbkgfzdlme.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsbWN3YmFpdW93YmtnZnpkbG1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTE1MTUsImV4cCI6MjA5MDIyNzUxNX0.VuY5iMcJ5W62gqjBMa6kQWQJwSa17L30Wp9KYQvD2b8');
function toggleMenu(){document.getElementById('menuDd').classList.toggle('show');}
document.addEventListener('click',e=>{if(!document.getElementById('menuBtn').contains(e.target))document.getElementById('menuDd').classList.remove('show');});
async function logout(){await sb.auth.signOut();localStorage.clear();window.location.href='auth.html';}
async function uploadPhoto(input){
  const file=input.files[0];if(!file)return;
  const {data:{session}}=await sb.auth.getSession();if(!session)return;
  const {error}=await sb.storage.from('media').upload(session.user.id+'/photos/'+Date.now()+'.jpg',file,{contentType:file.type});
  if(!error){alert('Photo uploaded!');loadProfile();}else alert('Error: '+error.message);
}
async function loadProfile(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='auth.html';return;}
  const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  const {data:media}=await sb.from('media').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false});
  const {data:matches}=await sb.from('daily_matches').select('id').eq('user_id',session.user.id);
  const {data:convos}=await sb.from('conversations').select('id').or('user_a.eq.'+session.user.id+',user_b.eq.'+session.user.id);
  const name=p?.name||'Your Name';
  const age=p?.age||'';
  const city=p?.city||'';
  const bio=p?.bio||'';
  const initial=(name[0]||'?').toUpperCase();
  const isPremium=JSON.parse(localStorage.getItem('miru_swipes')||'{}').premium||false;
  const mediaList=media||[];
  const videos=mediaList.filter(m=>m.type==='video'||!m.type);
  const photos=mediaList.filter(m=>m.type==='photo');
  const gridHTML=videos.length>0
    ?videos.map((m,i)=>`<div class="grid-item"><div class="gi-bg g${(i%3)+1}"></div><div class="gi-type">▶ video</div></div>`).join('')
    :`<div class="empty-grid"><div class="eg-icon">🎥</div><div class="eg-title">No videos yet</div><div class="eg-sub">Add a video so people can see the real you.</div><button class="eg-btn" onclick="window.location.href='video.html'">Record video</button></div>`;
  const photoHTML=photos.length>0
    ?photos.map((m,i)=>`<div class="grid-item"><div class="gi-bg g${(i%3)+1}"></div><div class="gi-type">📷</div></div>`).join('')
    :`<div class="empty-grid"><div class="eg-icon">📷</div><div class="eg-title">No photos yet</div><div class="eg-sub">Add photos to your profile.</div><button class="eg-btn" onclick="document.getElementById('photoInput').click()">Upload photo</button></div>`;
  const settingsHTML=`<div style="grid-column:1/-1;background:#fff;">
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;cursor:pointer;" onclick="window.location.href='onboarding.html'"><span style="font-size:14px;">Edit profile</span><span style="color:var(--text3);">›</span></div>
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><span style="font-size:14px;">Email</span><span style="font-size:13px;color:var(--text3);">${session.user.email}</span></div>
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;cursor:pointer;" onclick="window.location.href='privacy.html'"><span style="font-size:14px;">Privacy Policy</span><span style="color:var(--text3);">›</span></div>
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;cursor:pointer;" onclick="window.location.href='terms.html'"><span style="font-size:14px;">Terms of Service</span><span style="color:var(--text3);">›</span></div>
    <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;cursor:pointer;" onclick="logout()"><span style="font-size:14px;">Sign out</span><span style="color:var(--text3);">›</span></div>
    <div style="padding:1rem 1.25rem;display:flex;justify-content:space-between;cursor:pointer;" onclick="window.location.href='delete-account.html'"><span style="font-size:14px;color:#CC3355;">Delete account</span><span style="color:#CC3355;">›</span></div>
  </div>`;
  document.getElementById('main').innerHTML=`
    <div class="profile-top">
      <div class="avatar-wrap">
        <div class="avatar">${initial}</div>
        <div class="avatar-add" onclick="document.getElementById('photoInput').click()">+</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
      <div class="profile-name">${name}${age?', '+age:''}</div>
      <div class="profile-loc">${city?'📍 '+city:''}</div>
      ${isPremium?'<div class="premium-badge">⭐ Premium</div>':''}
      ${bio?'<div class="profile-bio">'+bio+'</div>':'<div class="profile-bio" style="color:var(--text3);font-style:italic;">No bio yet — tap Edit to add one.</div>'}
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num">${matches?.length||0}</div><div class="stat-label">Matches</div></div>
      <div class="stat"><div class="stat-num">${videos.length+photos.length}</div><div class="stat-label">Media</div></div>
      <div class="stat"><div class="stat-num">${convos?.length||0}</div><div class="stat-label">Convos</div></div>
    </div>
    <div class="profile-btns">
      <button class="btn-edit" onclick="window.location.href='onboarding.html'">✏️ Edit profile</button>
      <button class="btn-media" onclick="window.location.href='video.html'">🎥</button>
      <button class="btn-media" onclick="document.getElementById('photoInput').click()">📷</button>
    </div>
    <div class="media-tabs" id="tabs">
      <div class="mtab active" onclick="switchTab(0)">🎬 Videos</div>
      <div class="mtab" onclick="switchTab(1)">📷 Photos</div>
      <div class="mtab" onclick="switchTab(2)">⚙️ Settings</div>
    </div>
    <div class="video-grid" id="grid">${gridHTML}</div>`;
  window._grids=[gridHTML,photoHTML,settingsHTML];
}
function switchTab(i){
  document.querySelectorAll('.mtab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.getElementById('grid').innerHTML=window._grids[i];
}
loadProfile();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background: radial-gradient(circle at top,#1a102d,#0f0f0f);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  display:flex;
  align-items:center;
  backdrop-filter:blur(20px);
}

/* AVATAR */
.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #9F7AEA;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{
  margin-left:20px;
}

.name{
  font-size:22px;
  font-weight:bold;
}

.badge{
  margin-left:8px;
  font-size:10px;
  background:#9F7AEA;
  padding:3px 8px;
  border-radius:10px;
}

.bio{
  color:#aaa;
  margin-top:5px;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  margin-top:10px;
}

.grid img,
.grid video{
  width:100%;
  height:130px;
  object-fit:cover;
}

/* MUSIC BUTTON */
.musicToggle{
  position:fixed;
  top:15px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="musicToggle" onclick="toggleMusic()">🎵</div>

<audio id="music" loop></audio>

<div class="header">
  <div class="avatar">
    <img id="avatar">
  </div>

  <div class="info">
    <div class="name" id="name"></div>
    <div class="bio" id="bio"></div>

    <div class="btn" onclick="toggleEdit()">Edit</div>
    <div class="btn" onclick="generateBio()">✨ AI Bio</div>
    <div class="btn" onclick="addPost()">➕ Add Post</div>
  </div>
</div>

<!-- EDIT -->
<div id="editForm" style="display:none;padding:15px;">
  <input id="nameInput" placeholder="Name">
  <input id="ageInput" placeholder="Age">
  <textarea id="bioInput"></textarea>
  <input id="avatarInput" placeholder="Avatar URL">
  <input id="musicInput" placeholder="Music URL">
  <button onclick="saveProfile()">Save</button>
</div>

<div class="grid" id="grid"></div>

<script>
const { createClient } = supabase;
const sb = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

let musicOn = true;

function toggleMusic(){
  const m = document.getElementById("music");
  if(musicOn){
    m.pause();
  }else{
    m.play();
  }
  musicOn = !musicOn;
}

// LOAD PROFILE
async function loadProfile(){
  const { data:{user} } = await sb.auth.getUser();

  const { data } = await sb
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if(data){
    name.innerHTML = data.name + ", " + (data.age || "");

    if(data.is_premium){
      name.innerHTML += " <span class='badge'>💎</span>";
    }

    bio.textContent = data.bio || "";
    avatar.src = data.avatar_url || "";

    if(data.music_url){
      const m = document.getElementById("music");
      m.src = data.music_url;
      m.play();
    }

    nameInput.value = data.name || "";
    ageInput.value = data.age || "";
    bioInput.value = data.bio || "";
    avatarInput.value = data.avatar_url || "";
    musicInput.value = data.music_url || "";
  }
}

// SAVE
async function saveProfile(){
  const { data:{user} } = await sb.auth.getUser();

  await sb.from("profiles").upsert({
    user_id:user.id,
    name:nameInput.value,
    age:parseInt(ageInput.value),
    bio:bioInput.value,
    avatar_url:avatarInput.value,
    music_url:musicInput.value
  });

  alert("Saved");
  loadProfile();
}

function toggleEdit(){
  editForm.style.display = editForm.style.display === "none" ? "block":"none";
}

// AI BIO
function generateBio(){
  bioInput.value = "Adventurous, chill, and always down for something new 🔥";
}

// ADD POST
async function addPost(){
  const url = prompt("Enter image/video URL");

  const { data:{user} } = await sb.auth.getUser();

  await sb.from("posts").insert({
    user_id:user.id,
    media_url:url,
    media_type:url.includes("mp4")?"video":"image"
  });

  loadPosts();
}

// LOAD POSTS
async function loadPosts(){
  const { data:{user} } = await sb.auth.getUser();

  const { data } = await sb
    .from("posts")
    .select("*")
    .eq("user_id", user.id);

  grid.innerHTML = "";

  data.forEach(post=>{
    let el;

    if(post.media_type==="video"){
      el=document.createElement("video");
      el.src=post.media_url;
      el.autoplay=true;
      el.loop=true;
      el.muted=true;
    }else{
      el=document.createElement("img");
      el.src=post.media_url;
    }

    el.onclick = ()=>{
      window.open(post.media_url,"_blank");
    };

    grid.appendChild(el);
  });
}

loadProfile();
loadPosts();
</script>

</body>
</html>

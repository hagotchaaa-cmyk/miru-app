<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Inter', -apple-system;
      background: radial-gradient(circle at top,#1a102d,#0f0f0f);
      color:white;
    }

    .profile{
      text-align:center;
      padding:40px 20px;
    }

    .avatar{
      width:140px;
      height:140px;
      margin:auto;
      border-radius:50%;
      overflow:hidden;
      border:3px solid #9F7AEA;
      box-shadow:0 10px 30px rgba(159,122,234,0.3);
      background:#222;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .name{
      font-size:26px;
      font-weight:700;
      margin-top:12px;
    }

    .bio{
      color:#aaa;
      margin-top:6px;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      margin-top:20px;
      padding:15px 0;
      background:rgba(255,255,255,0.03);
    }

    .actions{
      display:flex;
      gap:10px;
      padding:15px;
    }

    .btn{
      flex:1;
      padding:12px;
      border-radius:25px;
      background:linear-gradient(45deg,#9F7AEA,#6EE7B7);
      text-align:center;
      cursor:pointer;
      font-weight:600;
      color:black;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:3px;
    }

    .grid img,
    .grid video{
      width:100%;
      height:130px;
      object-fit:cover;
    }
  </style>
</head>

<body>

<div class="profile">
  <div class="avatar">
    <img id="avatar">
  </div>

  <div class="name" id="name">Loading profile...</div>
  <div class="bio" id="bio"></div>
</div>

<div class="stats">
  <div>0<br><small>MEDIA</small></div>
  <div>0<br><small>MATCHES</small></div>
  <div>0<br><small>CONVOS</small></div>
</div>

<div class="actions">
  <div class="btn" onclick="addPost()">➕ Add</div>
</div>

<div class="grid" id="grid"></div>

<script>
const sb = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

/* LOAD PROFILE (NO FAIL VERSION) */
async function loadProfile(){
  try{
    const { data } = await sb.auth.getUser();
    const user = data.user;

    if(!user){
      document.getElementById("name").textContent = "Not logged in";
      return;
    }

    // ALWAYS GET ARRAY (no .single)
    const res = await sb
      .from("profiles")
      .select("*")
      .eq("user_id", user.id);

    let profile = res.data && res.data.length ? res.data[0] : null;

    // CREATE IF NOT EXISTS
    if(!profile){
      await sb.from("profiles").insert({
        user_id:user.id,
        name:"New User"
      });

      // fetch again
      const again = await sb
        .from("profiles")
        .select("*")
        .eq("user_id", user.id);

      profile = again.data?.[0];
    }

    // RENDER ALWAYS
    document.getElementById("name").textContent =
      (profile?.name || "User");

    document.getElementById("bio").textContent =
      profile?.bio || "No bio yet";

    if(profile?.avatar_url){
      document.getElementById("avatar").src = profile.avatar_url;
    }

  }catch(e){
    console.error(e);
    document.getElementById("name").textContent = "Error loading profile";
  }
}

/* POSTS (SAFE) */
async function loadPosts(){
  try{
    const { data } = await sb.auth.getUser();
    const user = data.user;

    if(!user) return;

    const res = await sb
      .from("posts")
      .select("*")
      .eq("user_id", user.id);

    const posts = res.data || [];

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    posts.forEach(p=>{
      let el;

      if(p.media_type==="video"){
        el=document.createElement("video");
        el.src=p.media_url;
        el.autoplay=true;
        el.loop=true;
        el.muted=true;
      }else{
        el=document.createElement("img");
        el.src=p.media_url;
      }

      grid.appendChild(el);
    });

  }catch(e){
    console.error(e);
  }
}

/* UPLOAD */
async function addPost(){
  const input = document.createElement("input");
  input.type="file";
  input.accept="image/*,video/*";

  input.onchange = async e=>{
    const file = e.target.files[0];
    const { data } = await sb.auth.getUser();
    const user = data.user;

    const path = `${user.id}/${Date.now()}_${file.name}`;

    await sb.storage.from("posts").upload(path, file);

    const url = `${window.SUPABASE_URL}/storage/v1/object/public/posts/${path}`;

    await sb.from("posts").insert({
      user_id:user.id,
      media_url:url,
      media_type:file.type.includes("video") ? "video" : "image"
    });

    loadPosts();
  };

  input.click();
}

/* INIT */
loadProfile();
loadPosts();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

.top {
  display: flex;
  padding: 20px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #333;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  margin-left: 20px;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.bio {
  color: #aaa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

.grid img, .grid video {
  width: 100%;
  height: 120px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="top">
  <div class="avatar">
    <img id="avatar">
  </div>

  <div class="info">
    <div class="name" id="name">Loading...</div>
    <div class="bio" id="bio"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const { createClient } = supabase;

const sb = createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

async function loadProfile(){
  const { data: { user } } = await sb.auth.getUser();

  const { data } = await sb
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (data){
    document.getElementById("name").textContent = data.name;
    document.getElementById("bio").textContent = data.bio;

    if (data.avatar_url){
      document.getElementById("avatar").src = data.avatar_url;
    }
  }
}

async function loadPosts(){
  const { data: { user } } = await sb.auth.getUser();

  const { data } = await sb
    .from("posts")
    .select("*")
    .eq("user_id", user.id);

  const grid = document.getElementById("grid");

  data.forEach(post => {
    let el;

    if(post.media_type === "video"){
      el = document.createElement("video");
      el.src = post.media_url;
    } else {
      el = document.createElement("img");
      el.src = post.media_url;
    }

    grid.appendChild(el);
  });
}

loadProfile();
loadPosts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f5f7;
  color:#111;
}

/* PROFILE HEADER */
.profile{
  text-align:center;
  padding:30px 20px;
  background:white;
}

.avatar{
  width:110px;
  height:110px;
  margin:auto;
  border-radius:50%;
  background:#7c5bcf;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:white;
  position:relative;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

.plus{
  position:absolute;
  bottom:0;
  right:0;
  background:#7c5bcf;
  border-radius:50%;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.name{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.bio{
  color:#777;
  margin-top:6px;
}

/* MUSIC */
.music{
  margin-top:10px;
  color:#7c5bcf;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  background:#fafafa;
  padding:15px 0;
}

.stat{
  text-align:center;
}

/* ACTIONS */
.actions{
  display:flex;
  gap:10px;
  padding:15px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:25px;
  background:#eee;
  text-align:center;
  cursor:pointer;
}

.btn.primary{
  background:#7c5bcf;
  color:white;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-around;
  border-bottom:2px solid #eee;
}

.tab{
  padding:12px;
  cursor:pointer;
}

.tab.active{
  border-bottom:3px solid #7c5bcf;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.grid img,
.grid video{
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="profile">

  <div class="avatar">
    <img id="avatar">
    <div class="plus">+</div>
  </div>

  <div class="name" id="name">Loading...</div>
  <div class="bio" id="bio"></div>

  <div class="music" id="musicDisplay"></div>

</div>

<div class="stats">
  <div class="stat">
    <div id="matches">0</div>
    <small>MATCHES</small>
  </div>
  <div class="stat">
    <div id="postCount">0</div>
    <small>MEDIA</small>
  </div>
  <div class="stat">
    <div id="convos">0</div>
    <small>CONVOS</small>
  </div>
</div>

<div class="actions">
  <div class="btn primary" onclick="toggleEdit()">✏️ Edit</div>
  <div class="btn" onclick="pickMusic()">🎵</div>
  <div class="btn" onclick="addPost()">➕</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('video')">🎥 Videos</div>
  <div class="tab" onclick="setTab('image')">📸 Photos</div>
</div>

<div class="grid" id="grid"></div>

<audio id="music" loop></audio>

<script>
const { createClient } = supabase;
const sb = createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

let currentTab = "video";

// PROFILE
async function loadProfile(){
  const { data:{user} } = await sb.auth.getUser();

  const { data } = await sb
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if(data){
    name.textContent = data.name + ", " + (data.age || "");
    bio.textContent = data.bio || "";
    avatar.src = data.avatar_url || "";

    if(data.music_title){
      musicDisplay.textContent = "🎵 " + data.music_title;
      music.src = data.music_url;
      music.play();
    }
  }
}

// POSTS
async function loadPosts(){
  const { data:{user} } = await sb.auth.getUser();

  const { data } = await sb
    .from("posts")
    .select("*")
    .eq("user_id", user.id);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = data.filter(p => p.media_type === currentTab);

  postCount.textContent = data.length;

  filtered.forEach(post=>{
    let el;

    if(post.media_type==="video"){
      el=document.createElement("video");
      el.src=post.media_url;
      el.autoplay=true;
      el.loop=true;
      el.muted=true;
    }else{
      el=document.createElement("img");
      el.src=post.media_url;
    }

    grid.appendChild(el);
  });
}

// ADD POST (REAL FILE UPLOAD)
async function addPost(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*,video/*";

  input.onchange = async e=>{
    const file = e.target.files[0];
    const { data:{user} } = await sb.auth.getUser();

    const { data, error } = await sb.storage
      .from("posts")
      .upload(`${user.id}/${Date.now()}`, file);

    if(error){
      alert(error.message);
      return;
    }

    const type = file.type.includes("video") ? "video" : "image";

    await sb.from("posts").insert({
      user_id:user.id,
      media_url:data.path,
      media_type:type
    });

    loadPosts();
  };

  input.click();
}

// MUSIC
async function pickMusic(){
  const song = prompt("Enter song name");

  if(!song) return;

  const preview = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

  const { data:{user} } = await sb.auth.getUser();

  await sb.from("profiles").update({
    music_title:song,
    music_url:preview
  }).eq("user_id", user.id);

  loadProfile();
}

// TAB SWITCH
function setTab(type){
  currentTab = type;
  loadPosts();
}

// INIT
loadProfile();
loadPosts();
</script>

</body>
</html>

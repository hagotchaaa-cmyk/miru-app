<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<!-- CONFIG -->
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.top {
  display: flex;
  align-items: center;
  padding: 20px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #333;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.info {
  margin-left: 20px;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

.bio {
  font-size: 14px;
  color: #aaa;
}

button {
  margin: 20px;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(90deg, #7C5CBF, #9F7AEA);
  color: white;
  width: calc(100% - 40px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 10px;
}

.grid img, .grid video {
  width: 100%;
  height: 120px;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="top">
  <div class="avatar">
    <img id="avatar" src="">
  </div>

  <div class="info">
    <div class="name" id="name">Loading...</div>
    <div class="bio" id="bio"></div>
  </div>
</div>

<button onclick="window.location.href='edit-profile.html'">
  Edit Profile
</button>

<div class="grid" id="grid"></div>

<script>
const { createClient } = supabase;

const sb = createClient(
  window.SUPABASE_URL,
  window.SUPABASE_KEY
);

// LOAD PROFILE
async function loadProfile(){
  const { data: { user } } = await sb.auth.getUser();

  if (!user) {
    window.location.href = "/auth.html";
    return;
  }

  const { data: profile } = await sb
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .single();

  if (profile) {
    document.getElementById("name").textContent = profile.name || "No Name";
    document.getElementById("bio").textContent = profile.bio || "";
    
    if (profile.avatar_url) {
      document.getElementById("avatar").src = profile.avatar_url;
    }
  }
}

// LOAD POSTS
async function loadPosts(){
  const { data: { user } } = await sb.auth.getUser();

  const { data } = await sb
    .from("posts")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(post => {
    let el;

    if(post.media_type === "video"){
      el = document.createElement("video");
      el.src = post.media_url;
      el.controls = true;
    } else {
      el = document.createElement("img");
      el.src = post.media_url;
    }

    grid.appendChild(el);
  });
}

// RUN
loadProfile();
loadPosts();
</script>

</body>
</html>

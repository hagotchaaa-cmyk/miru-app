<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miru — Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F8F6FF;color:#1A1528;height:100vh;display:flex;flex-direction:column}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #E4DEFF;background:#fff}
    .logo{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;font-weight:700}
    .wrap{display:flex;flex:1;min-height:0}
    .sidebar{width:360px;max-width:100%;border-right:1px solid #E4DEFF;background:#fff;display:flex;flex-direction:column}
    .side-head{padding:16px;border-bottom:1px solid #E4DEFF}
    .title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
    .title em{font-style:italic;color:#7C5CBF}
    .search{margin-top:12px}
    .search input{width:100%;padding:12px 14px;border-radius:999px;border:1px solid #E4DEFF;background:#F8F6FF}
    .threads{flex:1;overflow:auto}
    .thread{padding:14px 16px;border-bottom:1px solid #E4DEFF;cursor:pointer}
    .thread.active{background:#EDE8FF}
    .tname{font-weight:700}
    .tprev{font-size:13px;color:#A99DC0;margin-top:4px}
    .chat{flex:1;display:flex;flex-direction:column;min-width:0}
    .chat-head{padding:16px;border-bottom:1px solid #E4DEFF;background:#fff;font-weight:700}
    .msgs{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .bubble{max-width:72%;padding:10px 12px;border-radius:16px;font-size:14px;line-height:1.45}
    .me{align-self:flex-end;background:#7C5CBF;color:#fff;border-radius:16px 4px 16px 16px}
    .them{align-self:flex-start;background:#F0ECFF;color:#1A1528;border-radius:4px 16px 16px 16px}
    .input{display:flex;gap:10px;padding:14px;border-top:1px solid #E4DEFF;background:#fff}
    .input input{flex:1;padding:12px 14px;border-radius:999px;border:1px solid #E4DEFF;background:#F8F6FF}
    .send{width:44px;height:44px;border:none;border-radius:50%;background:#7C5CBF;color:#fff;cursor:pointer}
    .empty{padding:30px;text-align:center;color:#6B5F8A}
    .tabs{display:flex;justify-content:space-around;align-items:center;height:76px;border-top:1px solid #E4DEFF;background:#fff}
    .tab{display:flex;flex-direction:column;align-items:center;gap:3px;color:#A99DC0;text-decoration:none}
    .tab.on{color:#7C5CBF}
    .tab div:last-child{font-size:9px;text-transform:uppercase}
    @media (max-width: 700px){
      .wrap{display:block}
      .sidebar{width:100%;height:40%}
      .chat{height:60%}
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="logo">miru.</div>
    <div>Messages</div>
  </div>

  <div class="wrap">
    <div class="sidebar">
      <div class="side-head">
        <div class="title">Your <em>conversations.</em></div>
        <div class="search"><input placeholder="Search..." oninput="filterThreads(this.value)"></div>
      </div>
      <div class="threads" id="threads"></div>
    </div>

    <div class="chat">
      <div class="chat-head" id="chatName">Select a conversation</div>
      <div class="msgs" id="msgs"><div class="empty">Choose a conversation to start chatting.</div></div>
      <div class="input">
        <input id="msgInput" placeholder="Say something real..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="send" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <a class="tab" href="index.html"><div>💜</div><div>Matches</div></a>
    <a class="tab on" href="messages.html"><div>💬</div><div>Messages</div></a>
    <a class="tab" href="explore.html"><div>🔍</div><div>Explore</div></a>
    <a class="tab" href="profile.html"><div>👤</div><div>Profile</div></a>
  </div>

<script>
const sb = supabase.createClient(
  window.SUPABASE_URL,
  window.SUPABASE_ANON_KEY || window.SUPABASE_KEY
);

let me = null;
let convos = [];
let currentConvo = null;
let msgSub = null;

async function init(){
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return window.location.href = "auth.html";
  me = user;
  await loadConversations();
}

async function loadConversations(){
  const { data, error } = await sb
    .from("conversations")
    .select("*")
    .or(`user_a.eq.${me.id},user_b.eq.${me.id}`)
    .order("last_message_at", { ascending:false });

  if (error) {
    document.getElementById("threads").innerHTML = `<div class="empty">${error.message}</div>`;
    return;
  }

  convos = data || [];
  await renderThreads(convos);
}

async function renderThreads(list){
  if (!list.length) {
    document.getElementById("threads").innerHTML = `<div class="empty">No conversations yet.</div>`;
    return;
  }

  const ids = [...new Set(list.map(c => c.user_a === me.id ? c.user_b : c.user_a))];
  const { data: profileRows } = await sb.from("profiles").select("user_id,name").in("user_id", ids);
  const byId = Object.fromEntries((profileRows || []).map(p => [p.user_id, p]));

  document.getElementById("threads").innerHTML = list.map(c => {
    const otherId = c.user_a === me.id ? c.user_b : c.user_a;
    const other = byId[otherId];
    return `
      <div class="thread" id="thread-${c.id}" onclick="openConversation('${c.id}')">
        <div class="tname">${other?.name || "Match"}</div>
        <div class="tprev">${c.last_message || "You matched 💜"}</div>
      </div>
    `;
  }).join("");
}

async function filterThreads(q){
  q = q.toLowerCase();
  if (!q) return renderThreads(convos);

  const ids = [...new Set(convos.map(c => c.user_a === me.id ? c.user_b : c.user_a))];
  const { data: profileRows } = await sb.from("profiles").select("user_id,name").in("user_id", ids);
  const byId = Object.fromEntries((profileRows || []).map(p => [p.user_id, p]));
  const filtered = convos.filter(c => {
    const otherId = c.user_a === me.id ? c.user_b : c.user_a;
    return (byId[otherId]?.name || "").toLowerCase().includes(q);
  });
  renderThreads(filtered);
}

async function openConversation(id){
  currentConvo = id;
  document.querySelectorAll(".thread").forEach(el => el.classList.remove("active"));
  const active = document.getElementById("thread-" + id);
  if (active) active.classList.add("active");

  const convo = convos.find(c => c.id === id);
  const otherId = convo.user_a === me.id ? convo.user_b : convo.user_a;
  const { data: other } = await sb.from("profiles").select("name").eq("user_id", otherId).maybeSingle();
  document.getElementById("chatName").textContent = other?.name || "Match";

  await loadMessages(id);

  if (msgSub) {
    await sb.removeChannel(msgSub);
    msgSub = null;
  }

  msgSub = sb
    .channel("room-" + id)
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "messages",
      filter: `conversation_id=eq.${id}`
    }, payload => appendMessage(payload.new))
    .subscribe();
}

async function loadMessages(id){
  const { data, error } = await sb
    .from("messages")
    .select("*")
    .eq("conversation_id", id)
    .order("created_at", { ascending:true });

  if (error) {
    document.getElementById("msgs").innerHTML = `<div class="empty">${error.message}</div>`;
    return;
  }

  const msgs = data || [];
  if (!msgs.length) {
    document.getElementById("msgs").innerHTML = `<div class="empty">Start the conversation.</div>`;
    return;
  }

  document.getElementById("msgs").innerHTML = msgs.map(renderBubble).join("");
  scrollMsgs();
}

function renderBubble(m){
  const cls = m.sender_id === me.id ? "bubble me" : "bubble them";
  return `<div class="${cls}">${escapeHtml(m.content || "")}</div>`;
}

function appendMessage(m){
  const box = document.getElementById("msgs");
  if (box.querySelector(".empty")) box.innerHTML = "";
  box.innerHTML += renderBubble(m);
  scrollMsgs();
}

async function sendMessage(){
  const input = document.getElementById("msgInput");
  const content = input.value.trim();
  if (!content || !currentConvo) return;
  input.value = "";

  const now = new Date().toISOString();

  const { error } = await sb.from("messages").insert({
    conversation_id: currentConvo,
    sender_id: me.id,
    content,
    created_at: now
  });

  if (error) return alert(error.message);

  await sb
    .from("conversations")
    .update({ last_message: content.slice(0,100), last_message_at: now })
    .eq("id", currentConvo);
}

function scrollMsgs(){
  const box = document.getElementById("msgs");
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}

init();
</script>
</body>
</html>
